<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">
  <title>Far Post — Scottish Football</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/farpost.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #111213; color: #e8e6e1; font-family: 'Barlow', sans-serif; min-height: 100vh; }
    .nav { position: sticky; top: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 0 1.25rem; height: 52px; border-bottom: 1px solid #2a2b2d; background: rgba(13,14,15,0.96); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); transition: height 0.2s ease, box-shadow 0.2s ease; }
    .nav.scrolled { height: 44px; box-shadow: 0 2px 24px rgba(0,0,0,0.5); border-bottom-color: #1a1b1d; }
    .logo { font-family: 'Barlow Condensed', sans-serif; font-size: 26px; font-weight: 700; letter-spacing: 0.12em; color: #e8e6e1; text-decoration: none; white-space: nowrap; transition: font-size 0.2s; }
    .nav.scrolled .logo { font-size: 22px; }
    .logo-dot { color: #e84040; }
    .nav-links { display: flex; gap: 20px; }
    .nav-links a { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 600; letter-spacing: 0.08em; text-decoration: none; color: #888; text-transform: uppercase; }
    .nav-links a:hover { color: #e8e6e1; }
    .nav-hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; padding: 4px; background: none; border: none; flex-shrink: 0; }
    .nav-hamburger span { display: block; width: 22px; height: 2px; background: #888; }
    .mobile-menu { display: none; flex-direction: column; background: rgba(13,14,15,0.98); border-bottom: 1px solid #2a2b2d; position: sticky; top: 52px; z-index: 99; }
    .mobile-menu.open { display: flex; }
    .mobile-menu a { font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: #888; text-decoration: none; padding: 0.875rem 1.25rem; border-bottom: 1px solid #1a1b1d; }
    .mobile-menu a:last-child { border-bottom: none; }

    .article-hero { position: relative; height: 420px; overflow: hidden; border-bottom: 1px solid #2a2b2d; }
    .article-hero-img { width: 100%; height: 100%; object-fit: cover; }
    .article-hero-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.1) 60%); }
    .article-hero-empty { height: 0; }

    .article-wrap { max-width: 740px; margin: 0 auto; padding: 2.5rem 1.5rem 4rem; }
    .back-link { display: inline-flex; align-items: center; gap: 6px; font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #555; text-decoration: none; margin-bottom: 2rem; }
    .back-link:hover { color: #e8e6e1; }
    .back-link svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 2; }
    .article-tag { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; background: #e84040; color: #fff; padding: 3px 8px; border-radius: 2px; display: inline-block; margin-bottom: 16px; }
    .article-title { font-family: 'Barlow Condensed', sans-serif; font-size: 52px; font-weight: 700; line-height: 1.0; color: #e8e6e1; margin-bottom: 16px; }
    .article-meta { display: flex; align-items: center; gap: 12px; margin-bottom: 2rem; padding-bottom: 2rem; border-bottom: 1px solid #2a2b2d; }
    .meta-avatar { width: 32px; height: 32px; border-radius: 50%; background: #2a2b2d; display: flex; align-items: center; justify-content: center; font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 700; color: #888; flex-shrink: 0; }
    .meta-details { font-size: 13px; color: #555; }
    .meta-details strong { color: #888; font-weight: 500; }
    .article-body { font-size: 17px; line-height: 1.8; color: #c8c6c1; }
    .article-body p { margin-bottom: 1.4rem; }
    .article-body p:last-child { margin-bottom: 0; }
    .article-loading { font-size: 14px; color: #555; padding: 4rem 0; text-align: center; }
    .article-error { font-size: 14px; color: #e84040; padding: 4rem 0; text-align: center; }
    .club-links-section { margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid #2a2b2d; }
    .club-links-label { font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: #666; margin-bottom: 0.9rem; }
    .club-links-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); border: 1px solid #2a2b2d; }
    .club-link-card { display: flex; align-items: center; justify-content: space-between; gap: 0.9rem; padding: 0.95rem 1rem; text-decoration: none; color: inherit; border-right: 1px solid #2a2b2d; border-bottom: 1px solid #2a2b2d; background: linear-gradient(180deg, #131415 0%, #101112 100%); transition: background 0.15s; }
    .club-link-card:nth-child(2n) { border-right: none; }
    .club-link-card:hover { background: #171819; }
    .club-link-card:nth-last-child(-n+2) { border-bottom: none; }
    .club-link-copy { min-width: 0; }
    .club-link-name { font-family: 'Barlow Condensed', sans-serif; font-size: 20px; font-weight: 700; line-height: 1; color: #f1eee8; }
    .club-link-meta { font-size: 12px; color: #777; margin-top: 0.25rem; }
    .club-link-arrow { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: #e84040; }

    .related-section { border-top: 1px solid #2a2b2d; padding: 2rem 1.5rem; max-width: 740px; margin: 0 auto; }
    .related-title { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; color: #555; margin-bottom: 1.25rem; }
    .related-title span { color: #e84040; margin-right: 8px; }
    .related-grid { display: grid; grid-template-columns: repeat(2, 1fr); border: 1px solid #2a2b2d; }
    .related-card { cursor: pointer; transition: background 0.15s; text-decoration: none; display: block; overflow: hidden; border-right: 1px solid #2a2b2d; }
    .related-card:last-child { border-right: none; }
    .related-card:hover { background: #161718; }
    .related-card-img { width: 100%; height: 120px; object-fit: cover; display: block; }
    .related-card-img-placeholder { width: 100%; height: 120px; background: #1a1b1c; display: block; }
    .related-card-body { padding: 0.875rem 1.25rem; }
    .related-card-tag { font-family: 'Barlow Condensed', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: #e84040; margin-bottom: 5px; }
    .related-card-title { font-family: 'Barlow Condensed', sans-serif; font-size: 17px; font-weight: 700; line-height: 1.1; color: #e8e6e1; }

    .footer { padding: 1.25rem; border-top: 1px solid #2a2b2d; background: #0d0e0f; display: flex; align-items: center; justify-content: space-between; }
    .footer-logo { font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 700; letter-spacing: 0.12em; color: #333; }
    .footer-logo span { color: #e84040; }
    .footer-copy { font-size: 12px; color: #444; }

    #reading-progress { position: fixed; top: 0; left: 0; width: 0%; height: 3px; background: #e84040; z-index: 200; transition: width 0.1s linear; pointer-events: none; }

    @media (max-width: 680px) {
      .nav-links { display: none; }
      .nav-hamburger { display: flex; }
      .article-hero { height: 260px; }
      .article-wrap { padding: 1.5rem 1.25rem 3rem; }
      .article-title { font-size: 32px; }
      .article-body { font-size: 16px; }
      .back-link { margin-bottom: 1.25rem; }
      .club-links-grid { grid-template-columns: 1fr; }
      .club-link-card { border-right: none; }
      .club-link-card:nth-last-child(-n+2) { border-bottom: 1px solid #2a2b2d; }
      .club-link-card:last-child { border-bottom: none; }
      .related-grid { grid-template-columns: 1fr; }
      .related-card { border-right: none; border-bottom: 1px solid #2a2b2d; }
      .related-card:last-child { border-bottom: none; }
      .footer { flex-direction: column; gap: 6px; text-align: center; }
    }
  </style>
</head>
<body>

  <div id="reading-progress"></div>

  <nav class="nav">
    <a href="index.html" class="logo">FAR POST<span class="logo-dot">.</span></a>
    <div class="nav-links">
      <a href="news.html">News</a>
      <a href="opinions.html">Opinions</a>
      <a href="podcasts.html">Podcasts</a>
      <a href="clubs.html">Clubs</a>
      <a href="players.html">Players</a>
      <a href="results.html">Results</a>
      <a href="fixtures.html">Fixtures</a>
    </div>
    <button class="nav-hamburger" onclick="document.getElementById('mobile-menu').classList.toggle('open')" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <div class="mobile-menu" id="mobile-menu">
    <a href="news.html">News</a>
    <a href="opinions.html">Opinions</a>
    <a href="podcasts.html">Podcasts</a>
    <a href="clubs.html">Clubs</a>
    <a href="players.html">Players</a>
    <a href="results.html">Results</a>
    <a href="fixtures.html">Fixtures</a>
  </div>

  <div id="article-hero"></div>

  <div class="article-wrap">
    <a href="index.html" class="back-link">
      <svg viewBox="0 0 24 24"><polyline points="15,18 9,12 15,6"/></svg>
      Back to Far Post
    </a>
    <div id="article-content">
      <div class="article-loading">Loading article...</div>
    </div>
  </div>

  <div class="related-section" id="related-section">
    <div class="related-title"><span>//</span>More from Far Post</div>
    <div class="related-grid" id="related-grid"></div>
  </div>

  <footer class="footer">
    <div class="footer-logo">FAR POST<span>.</span></div>
    <div class="footer-copy">Scottish football. No filter.</div>
  </footer>

  <script src="/assets/farpost.js"></script>
  <script>
    const {
      categoryLabel,
      escHtml,
      fetchJson,
      formatDate,
      initials,
      renderState,
      sanityImageUrl,
      setHTML,
      storyCardMarkup
    } = window.FarPost;
    const getParam = k => new URLSearchParams(window.location.search).get(k);
    const CLUB_LEAGUES = [
      { id: '501', name: 'Premiership' },
      { id: '504', name: 'Championship' },
      { id: '516', name: 'League One' }
    ];

    function renderBody(blocks) {
      if (!blocks?.length) return '';
      return blocks.map(b => {
        if (b._type !== 'block') return '';
        const text = (b.children||[]).map(c => escHtml(c.text||'')).join('');
        return text.trim() ? `<p>${text}</p>` : '';
      }).join('');
    }

    function extractText(post) {
      const bodyText = (post.body || []).map(block => (block.children || []).map(child => child.text || '').join(' ')).join(' ');
      return [post.title, post.excerpt, bodyText].filter(Boolean).join(' ').toLowerCase();
    }

    async function loadRelatedClubs(post) {
      const text = extractText(post);
      if (!text) return [];

      const payloads = await Promise.all(CLUB_LEAGUES.map(async league => {
        const data = await fetchJson(`/.netlify/functions/standings?league=${league.id}`);
        return (data.standings || []).map(row => ({
          teamId: row.teamId,
          team: row.team,
          leagueId: league.id,
          leagueName: league.name
        }));
      }));

      const seen = new Set();
      return payloads.flat()
        .filter(club => {
          const name = (club.team || '').toLowerCase().trim();
          if (!name || seen.has(name)) return false;
          if (!text.includes(name)) return false;
          seen.add(name);
          return true;
        })
        .slice(0, 4);
    }

    function renderClubLinks(clubs) {
      if (!clubs.length) return '';
      return `
        <div class="club-links-section">
          <div class="club-links-label">Relevant clubs</div>
          <div class="club-links-grid">
            ${clubs.map(club => `
              <a class="club-link-card" href="club.html?id=${encodeURIComponent(club.teamId)}&league=${encodeURIComponent(club.leagueId)}&from=article">
                <div class="club-link-copy">
                  <div class="club-link-name">${escHtml(club.team)}</div>
                  <div class="club-link-meta">${escHtml(club.leagueName)} club page</div>
                </div>
                <div class="club-link-arrow">Open</div>
              </a>
            `).join('')}
          </div>
        </div>`;
    }

    async function loadArticle() {
      const id = getParam('id');
      const el = document.getElementById('article-content');
      const heroEl = document.getElementById('article-hero');
      if (!id) {
        renderState(el, 'empty', {
          eyebrow: 'Article',
          title: 'No article specified',
          message: 'Open a story from the homepage, news desk or opinion pages.',
          fullSpan: true
        });
        return;
      }
      try {
        const q = encodeURIComponent(`*[_type=="post"&&_id=="${id}"][0]{title,category,excerpt,body,author,publishedAt,mainImage}`);
        const post = (await fetchJson(`/.netlify/functions/sanity-fetch?query=${q}`)).result;
        if (!post) {
          renderState(el, 'empty', {
            eyebrow: 'Article',
            title: 'Article not found',
            message: 'The story may have moved or been removed from the current publication feed.',
            fullSpan: true
          });
          return;
        }
        document.title = `${post.title} — Far Post`;

        const imgRef = post.mainImage?.asset?._ref;
        const imgUrl = imgRef ? sanityImageUrl(imgRef) : null;

        if (imgUrl) {
          heroEl.className = 'article-hero';
          heroEl.innerHTML = `<img class="article-hero-img" src="${imgUrl}?w=1400&h=600&fit=crop&auto=format" alt="${escHtml(post.title)}" data-fallback="hide"><div class="article-hero-overlay"></div>`;
        } else {
          heroEl.className = 'article-hero-empty';
          heroEl.innerHTML = '';
        }

        let relatedClubs = [];
        try {
          relatedClubs = await loadRelatedClubs(post);
        } catch (clubError) {
          relatedClubs = [];
        }

        el.innerHTML = `
          <div class="article-tag">${escHtml(categoryLabel(post.category))}</div>
          <h1 class="article-title">${escHtml(post.title)}</h1>
          <div class="article-meta">
            <div class="meta-avatar">${escHtml(initials(post.author))}</div>
            <div class="meta-details"><strong>${escHtml(post.author||'Ewen Napier')}</strong>${post.publishedAt?' &nbsp;·&nbsp; '+escHtml(formatDate(post.publishedAt, { day:'numeric', month:'long', year:'numeric' })) :''}</div>
          </div>
          <div class="article-body">
            ${post.excerpt?`<p><em style="color:#aaa;">${escHtml(post.excerpt)}</em></p>`:''}
            ${renderBody(post.body)||'<p>Full article coming soon.</p>'}
          </div>
          ${renderClubLinks(relatedClubs)}`;

        loadRelated(id);
      } catch(e) {
        renderState(el, 'error', {
          eyebrow: 'Article',
          title: 'Could not load article',
          message: 'Please try again in a moment.',
          fullSpan: true
        });
      }
    }

    async function loadRelated(currentId) {
      const grid = document.getElementById('related-grid');
      const section = document.getElementById('related-section');
      try {
        const q = encodeURIComponent(`*[_type=="post"&&_id!="${currentId}"]|order(publishedAt desc)[0...2]{_id,title,category,mainImage}`);
        const posts = (await fetchJson(`/.netlify/functions/sanity-fetch?query=${q}`)).result;
        if (!posts?.length) { section.style.display='none'; return; }
        setHTML(grid, posts.map(post => storyCardMarkup(post, {
          cardClass: 'related-card',
          imageClass: 'related-card-img',
          placeholderClass: 'related-card-img-placeholder',
          bodyClass: 'related-card-body',
          labelClass: 'related-card-tag',
          titleClass: 'related-card-title',
          imageParams: '?w=600&h=240&fit=crop&auto=format',
          showExcerpt: false,
          showMeta: false
        })).join(''));
      } catch(e) { section.style.display='none'; }
    }

    (function() {
      var nav = document.querySelector('.nav');
      if (!nav) return;
      window.addEventListener('scroll', function() {
        nav.classList.toggle('scrolled', window.scrollY > 24);
      }, { passive: true });
    })();

    loadArticle();

    (function() {
      const bar = document.getElementById('reading-progress');
      window.addEventListener('scroll', function() {
        const content = document.getElementById('article-content');
        if (!content) return;
        const rect = content.getBoundingClientRect();
        const contentTop = rect.top + window.scrollY;
        const contentHeight = content.offsetHeight;
        const scrolled = window.scrollY - contentTop;
        const progress = Math.min(Math.max(scrolled / contentHeight, 0), 1);
        bar.style.width = (progress * 100) + '%';
      }, { passive: true });
    })();
  </script>
</body>
</html>
