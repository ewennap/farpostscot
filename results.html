<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">
  <title>Results & Fixtures — Far Post</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #111213; color: #e8e6e1; font-family: 'Barlow', sans-serif; min-height: 100vh; }

    .nav { position: sticky; top: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 0 1.25rem; height: 52px; border-bottom: 1px solid #2a2b2d; background: rgba(13,14,15,0.96); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); transition: height 0.2s ease, box-shadow 0.2s ease; }
    .nav.scrolled { height: 44px; box-shadow: 0 2px 24px rgba(0,0,0,0.5); border-bottom-color: #1a1b1d; }
    .logo { font-family: 'Barlow Condensed', sans-serif; font-size: 26px; font-weight: 700; letter-spacing: 0.12em; color: #e8e6e1; text-decoration: none; white-space: nowrap; transition: font-size 0.2s; }
    .nav.scrolled .logo { font-size: 22px; }
    .logo-dot { color: #e84040; }
    .nav-links { display: flex; gap: 20px; }
    .nav-links a { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 600; letter-spacing: 0.08em; text-decoration: none; color: #888; text-transform: uppercase; }
    .nav-links a:hover { color: #e8e6e1; }
    .nav-links a.active { color: #e8e6e1; border-bottom: 2px solid #e84040; padding-bottom: 2px; }
    .nav-hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; padding: 4px; background: none; border: none; flex-shrink: 0; }
    .nav-hamburger span { display: block; width: 22px; height: 2px; background: #888; }
    .mobile-menu { display: none; flex-direction: column; background: rgba(13,14,15,0.98); border-bottom: 1px solid #2a2b2d; position: sticky; top: 52px; z-index: 99; }
    .mobile-menu.open { display: flex; }
    .mobile-menu a { font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: #888; text-decoration: none; padding: 0.875rem 1.25rem; border-bottom: 1px solid #1a1b1d; }
    .mobile-menu a:last-child { border-bottom: none; }

    .page-header { padding: 2rem 1.5rem 0; border-bottom: 1px solid #2a2b2d; }
    .page-title { font-family: 'Barlow Condensed', sans-serif; font-size: 48px; font-weight: 800; letter-spacing: 0.02em; color: #e8e6e1; }
    .page-title span { color: #e84040; }
    .page-subtitle { font-size: 14px; color: #555; margin-top: 4px; margin-bottom: 1.5rem; }

    /* ── TOP TABS (Results / Fixtures / Table) ── */
    .tab-bar { display: flex; gap: 0; border-bottom: 1px solid #2a2b2d; }
    .tab-btn { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #555; background: none; border: none; border-bottom: 3px solid transparent; padding: 0.75rem 1.5rem; cursor: pointer; transition: color 0.15s, border-color 0.15s; margin-bottom: -1px; }
    .tab-btn:hover { color: #e8e6e1; }
    .tab-btn.active { color: #e8e6e1; border-bottom-color: #e84040; }

    /* ── LEAGUE TABS (Premiership / Championship / …) ── */
    .league-bar { display: flex; gap: 0; border-bottom: 1px solid #2a2b2d; background: #0d0e0f; overflow-x: auto; }
    .league-tab { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: #555; background: none; border: none; border-right: 1px solid #2a2b2d; padding: 0.5rem 1.25rem; cursor: pointer; white-space: nowrap; transition: color 0.15s, background 0.15s; }
    .league-tab:hover { color: #e8e6e1; background: #161718; }
    .league-tab.active { color: #e84040; background: #161718; }

    .section-header { display: flex; align-items: center; justify-content: space-between; padding: 0.6rem 1.25rem; border-bottom: 1px solid #2a2b2d; background: #0d0e0f; }
    .section-title { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: #555; }
    .section-title span { color: #e84040; margin-right: 8px; }

    /* Result cards */
    .results-container { border-bottom: 1px solid #2a2b2d; padding: 1rem; }
    .league-group { margin-bottom: 1rem; border: 1px solid #2a2b2d; background: linear-gradient(180deg, #111214 0%, #0f1011 100%); box-shadow: inset 0 1px 0 rgba(255,255,255,0.02); }
    .league-group:last-child { margin-bottom: 0; }
    .league-header { display: flex; flex-direction: column; gap: 0.85rem; padding: 1rem 1.25rem 0.95rem; background: linear-gradient(180deg, #161718 0%, #0d0e0f 100%); border-bottom: 1px solid #2a2b2d; }
    .league-header-top { display: flex; align-items: center; gap: 12px; }
    .league-badge { width: 8px; height: 8px; border-radius: 50%; background: #e84040; flex-shrink: 0; box-shadow: 0 0 0 4px rgba(232,64,64,0.12); }
    .league-name { font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; color: #f1efe9; line-height: 1; }
    .league-meta { display: flex; align-items: center; justify-content: space-between; gap: 0.75rem; flex-wrap: wrap; }
    .league-date { font-family: 'Barlow Condensed', sans-serif; font-size: 15px; font-weight: 600; letter-spacing: 0.05em; color: #bcb6ae; }
    .league-submeta { display: flex; align-items: center; gap: 0.6rem; flex-wrap: wrap; }
    .league-round { display: inline-flex; align-items: center; padding: 0.22rem 0.6rem; border: 1px solid #3a2b2b; background: rgba(232,64,64,0.09); font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: #ef9f9f; }
    .league-count { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: #666; }
    .match-grid { display: grid; grid-template-columns: repeat(3, 1fr); }
    .match-card { display: block; padding: 1rem 1.25rem; border-right: 1px solid #2a2b2d; border-bottom: 1px solid #2a2b2d; transition: background 0.15s; text-decoration: none; color: inherit; cursor: pointer; }
    .match-card:hover { background: #161718; }
    .match-card:focus-visible { outline: 2px solid #e84040; outline-offset: -2px; }
    .match-card:nth-child(3n) { border-right: none; }
    .match-teams { display: flex; flex-direction: column; gap: 6px; margin-bottom: 8px; }
    .match-team { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .team-name { font-family: 'Barlow Condensed', sans-serif; font-size: 15px; font-weight: 600; color: #aaa; flex: 1; }
    .team-name.winner { color: #fff; font-weight: 700; }
    .team-score { font-family: 'Barlow Condensed', sans-serif; font-size: 20px; font-weight: 700; color: #555; min-width: 24px; text-align: right; }
    .team-score.winner { color: #e84040; }
    .match-meta { display: flex; align-items: center; gap: 8px; }
    .match-status { font-family: 'Barlow Condensed', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #555; }
    .match-status.live { color: #e84040; }
    .match-time { font-size: 11px; color: #444; }

    /* Fixtures */
    .fixtures-container { border-bottom: 1px solid #2a2b2d; }
    .date-group { border-bottom: 1px solid #2a2b2d; }
    .date-group:last-child { border-bottom: none; }
    .date-header { padding: 0.5rem 1.25rem; background: #0d0e0f; border-bottom: 1px solid #2a2b2d; }
    .date-label { font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: #888; }
    .fixture-row { display: flex; align-items: center; padding: 0.875rem 1.25rem; border-bottom: 1px solid #1a1b1d; transition: background 0.15s; }
    .fixture-row:last-child { border-bottom: none; }
    .fixture-row:hover { background: #161718; }
    .fixture-time { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700; color: #555; min-width: 50px; }
    .fixture-teams { flex: 1; display: flex; align-items: center; }
    .fixture-home { font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 600; color: #e8e6e1; text-align: right; flex: 1; }
    .fixture-vs { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; color: #444; padding: 0 12px; }
    .fixture-away { font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 600; color: #e8e6e1; flex: 1; }

    /* League table / top scorers */
    .table-container { border-bottom: 1px solid #2a2b2d; overflow-x: auto; }
    .standings-table { width: 100%; border-collapse: collapse; min-width: 480px; }
    .standings-table th { font-family: 'Barlow Condensed', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: #555; padding: 0.6rem 1rem; text-align: left; background: #0d0e0f; border-bottom: 2px solid #2a2b2d; white-space: nowrap; }
    .standings-table th.num { text-align: center; }
    .standings-table td { padding: 0.6rem 1rem; border-bottom: 1px solid #1a1b1d; font-size: 14px; color: #aaa; vertical-align: middle; }
    .standings-table tr:last-child td { border-bottom: none; }
    .standings-table tr:hover td { background: #161718; color: #e8e6e1; }
    .standings-table td.num { text-align: center; font-family: 'Barlow Condensed', sans-serif; font-size: 15px; }
    .standings-table td.pos { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; color: #555; width: 28px; text-align: center; padding-left: 1.25rem; }
    .standings-table td.team-cell { font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 600; color: #e8e6e1; }
    .standings-table td.pts { font-family: 'Barlow Condensed', sans-serif; font-size: 17px; font-weight: 800; color: #e8e6e1; text-align: center; background: #161718; }
    .standings-table tr:hover td.pts { background: #1e1f20; }
    .team-crest { width: 20px; height: 20px; object-fit: contain; margin-right: 10px; vertical-align: middle; border-radius: 2px; }
    .result-crest { width: 20px; height: 20px; object-fit: contain; margin-right: 8px; vertical-align: middle; flex-shrink: 0; }
    .club-link { display: inline-flex; align-items: center; gap: 8px; min-width: 0; color: inherit; text-decoration: none; border-radius: 3px; transition: color 0.15s ease; }
    .club-link:hover { color: #fff; }
    .club-link:focus-visible { outline: 2px solid #e84040; outline-offset: 2px; }
    .club-link .team-name { min-width: 0; }
    .club-link .result-crest, .club-link .team-crest { margin-right: 0; }
    .split-row td { border-top: 2px solid #333 !important; }
    .zone-europe td.pos { border-left: 3px solid #4caf50; }
    .zone-relegation td.pos { border-left: 3px solid #e84040; }
    .scorers-table td.rank { width: 52px; text-align: center; font-family: 'Barlow Condensed', sans-serif; font-size: 15px; color: #666; }
    .scorers-table td.player-cell { font-family: 'Barlow Condensed', sans-serif; font-size: 17px; font-weight: 600; color: #e8e6e1; }
    .scorers-table td.team-cell-light { font-size: 14px; color: #aaa; white-space: nowrap; }
    .scorers-table td.goals { text-align: right; font-family: 'Barlow Condensed', sans-serif; font-size: 22px; font-weight: 800; color: #e8e6e1; background: #161718; }
    .scorers-table tr:hover td.goals { background: #1e1f20; }
    .scorer-crest { width: 24px; height: 24px; object-fit: contain; margin-right: 10px; vertical-align: middle; border-radius: 2px; }
    .scorer-team-wrap { display: inline-flex; align-items: center; min-width: 0; }

    .empty-state { padding: 3rem 1.25rem; text-align: center; color: #555; font-size: 14px; }
    .loading-state { padding: 2rem 1.25rem; text-align: center; }
    .loading-dots { display: inline-flex; gap: 6px; }
    .loading-dots span { width: 6px; height: 6px; border-radius: 50%; background: #e84040; animation: pulse 1.2s ease-in-out infinite; }
    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse { 0%,80%,100% { opacity: 0.2; } 40% { opacity: 1; } }

    .footer { padding: 1.25rem; border-top: 1px solid #2a2b2d; background: #0d0e0f; display: flex; align-items: center; justify-content: space-between; }
    .footer-logo { font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 700; letter-spacing: 0.12em; color: #333; }
    .footer-logo span { color: #e84040; }
    .footer-copy { font-size: 12px; color: #444; }

    @media (max-width: 680px) {
      .nav-links { display: none; }
      .nav-hamburger { display: flex; }
      .page-header { padding: 1.5rem 1.25rem 0; }
      .page-title { font-size: 36px; }
      .results-container { padding: 0.75rem; }
      .league-group { margin-bottom: 0.75rem; }
      .league-header { padding: 0.9rem 1rem 0.85rem; gap: 0.7rem; }
      .league-name { font-size: 16px; }
      .league-date { font-size: 14px; }
      .match-grid { grid-template-columns: 1fr; }
      .match-card { border-right: none; }
      .match-card:nth-child(3n) { border-right: none; }
      .tab-btn { padding: 0.75rem 1rem; font-size: 12px; }
      .table-container { overflow-x: visible; }
      .scorers-table { min-width: 0; width: 100%; }
      .scorers-table thead { display: none; }
      .scorers-table tbody { display: block; padding: 0.75rem; }
      .scorers-table tr { display: grid; grid-template-columns: 38px minmax(0, 1fr) auto; grid-template-areas: 'rank player goals' 'rank team goals'; gap: 0.1rem 0.75rem; padding: 0.85rem 0.9rem; margin-bottom: 0.65rem; border: 1px solid #2a2b2d; background: #111213; }
      .scorers-table tr:last-child { margin-bottom: 0; }
      .scorers-table td { display: block; padding: 0; border-bottom: none; background: transparent !important; }
      .scorers-table td.rank { grid-area: rank; width: auto; align-self: start; font-size: 18px; color: #7a7a7a; }
      .scorers-table td.player-cell { grid-area: player; font-size: 18px; line-height: 1.05; }
      .scorers-table td.team-cell-light { grid-area: team; display: flex; align-items: center; min-width: 0; white-space: normal; font-size: 13px; color: #888; }
      .scorers-table td.goals { grid-area: goals; align-self: center; text-align: right; font-size: 30px; line-height: 1; color: #e84040; }
      .scorer-crest { width: 22px; height: 22px; margin-right: 8px; flex-shrink: 0; }
      .footer { flex-direction: column; gap: 6px; text-align: center; }
    }
    @media (min-width: 681px) and (max-width: 1024px) {
      .match-grid { grid-template-columns: repeat(2, 1fr); }
      .match-card:nth-child(3n) { border-right: 1px solid #2a2b2d; }
      .match-card:nth-child(2n) { border-right: none; }
    }
  </style>
</head>
<body>

  <nav class="nav">
    <a href="index.html" class="logo">FAR POST<span class="logo-dot">.</span></a>
    <div class="nav-links">
      <a href="news.html">News</a>
      <a href="opinions.html">Opinions</a>
      <a href="podcasts.html">Podcasts</a>
      <a href="clubs.html">Clubs</a>
      <a href="results.html" class="active">Results</a>
      <a href="fixtures.html">Fixtures</a>
    </div>
    <button class="nav-hamburger" onclick="document.getElementById('mobile-menu').classList.toggle('open')" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <div class="mobile-menu" id="mobile-menu">
    <a href="news.html">News</a>
    <a href="opinions.html">Opinions</a>
    <a href="podcasts.html">Podcasts</a>
    <a href="clubs.html">Clubs</a>
    <a href="results.html">Results</a>
    <a href="fixtures.html">Fixtures</a>
  </div>

  <div class="page-header">
    <div class="page-title">Results & <span>Fixtures</span></div>
    <div class="page-subtitle">Scottish football scores, upcoming games and league tables</div>

    <!--
      TOP TABS — controls which content panel is shown.
      These buttons are completely independent of the league tabs below.
      onclick calls showContentTab(name) only.
    -->
    <div class="tab-bar" id="top-tab-bar">
      <button class="tab-btn active" id="toptab-results" onclick="showContentTab('results')">Results</button>
      <button class="tab-btn" id="toptab-topscorers" onclick="showContentTab('topscorers')">Top scorers</button>
      <button class="tab-btn" id="toptab-table" onclick="showContentTab('table')">Table</button>
    </div>
  </div>

  <!--
    LEAGUE TABS — controls which league's data is shown.
    These buttons are completely independent of the top tabs above.
    onclick calls setLeague(id) only.
  -->
  <div class="league-bar" id="league-bar">
    <button class="league-tab active" id="ltab-501" onclick="setLeague('501')">Premiership</button>
    <button class="league-tab" id="ltab-504" onclick="setLeague('504')">Championship</button>
    <button class="league-tab" id="ltab-507" onclick="setLeague('507')">Scottish Cup</button>
    <button class="league-tab" id="ltab-510" onclick="setLeague('510')">League Cup</button>
    <button class="league-tab" id="ltab-516" onclick="setLeague('516')">League One</button>
  </div>

  <!-- CONTENT PANELS — only one visible at a time, controlled by showContentTab() -->

  <div id="panel-results">
    <div class="section-header">
      <div class="section-title"><span>//</span>Latest results</div>
    </div>
    <div class="results-container" id="results-container">
      <div class="loading-state"><div class="loading-dots"><span></span><span></span><span></span></div></div>
    </div>
  </div>

  <div id="panel-fixtures" style="display:none">
    <div class="section-header">
      <div class="section-title"><span>//</span>Upcoming fixtures</div>
    </div>
    <div class="fixtures-container" id="fixtures-container">
      <div class="loading-state"><div class="loading-dots"><span></span><span></span><span></span></div></div>
    </div>
  </div>

  <div id="panel-table" style="display:none">
    <div class="section-header">
      <div class="section-title"><span>//</span>League table</div>
    </div>
    <div class="table-container" id="table-container">
      <div class="loading-state"><div class="loading-dots"><span></span><span></span><span></span></div></div>
    </div>
  </div>

  <div id="panel-topscorers" style="display:none">
    <div class="section-header">
      <div class="section-title"><span>//</span>Top scorers</div>
    </div>
    <div class="table-container" id="topscorers-container">
      <div class="loading-state"><div class="loading-dots"><span></span><span></span><span></span></div></div>
    </div>
  </div>

  <footer class="footer">
    <div class="footer-logo">FAR POST<span>.</span></div>
    <div class="footer-copy">Scottish football. No filter.</div>
  </footer>

  <script>
    // ─────────────────────────────────────────
    //  STATE — two completely independent vars
    // ─────────────────────────────────────────
    var activeContentTab = 'results';   // 'results' | 'topscorers' | 'table'
    var activeLeague     = '501';       // league ID string

    var KNOCKOUTS = ['507', '510'];     // no standings for these

    var LEAGUE_NAMES = {
      '501': 'Scottish Premiership',
      '504': 'Championship',
      '507': 'Scottish Cup',
      '510': 'League Cup',
      '516': 'League One'
    };

    // Simple data cache per league, per content type
    var cache = {};   // cache[league][type] = data

    function buildClubHref(teamId, leagueId) {
      if (!teamId || !leagueId) return '';
      return 'club.html?id=' + encodeURIComponent(teamId) + '&league=' + encodeURIComponent(leagueId);
    }

    function buildClubLink(team, leagueId, linkClass, nameClass, crestClass) {
      var crest = team.crest
        ? '<img class="' + crestClass + '" src="' + team.crest + '" alt="" onerror="this.style.display=\'none\'">'
        : '';
      var name = '<span class="' + nameClass + '">' + team.name + '</span>';
      var href = buildClubHref(team.id, leagueId);
      if (!href) return crest + name;
      return '<a class="club-link ' + linkClass + '" href="' + href + '" aria-label="View ' + team.name + ' club page">' + crest + name + '</a>';
    }

    function normaliseRoundLabel(round) {
      if (!round) return '';
      var cleaned = String(round).trim();
      if (!cleaned) return '';
      return /round|matchday|week|quarter|semi|final/i.test(cleaned) ? cleaned : 'Round ' + cleaned;
    }

    function getCached(league, type) {
      return cache[league] && cache[league][type];
    }
    function setCache(league, type, data) {
      if (!cache[league]) cache[league] = {};
      cache[league][type] = data;
    }

    // ─────────────────────────────────────────
    //  TOP TAB SWITCHING
    //  Only ever touches top-tab button styles
    //  and content panel visibility.
    //  Never touches league tabs or league state.
    // ─────────────────────────────────────────
    function showContentTab(name) {
      activeContentTab = name;

      // Update top-tab button active class
      ['results','topscorers','table'].forEach(function(t) {
        document.getElementById('toptab-' + t).classList.toggle('active', t === name);
      });

      // Show/hide content panels
      document.getElementById('panel-results').style.display    = name === 'results'    ? 'block' : 'none';
      document.getElementById('panel-fixtures').style.display   = name === 'fixtures'   ? 'block' : 'none';
      document.getElementById('panel-table').style.display      = name === 'table'      ? 'block' : 'none';
      document.getElementById('panel-topscorers').style.display = name === 'topscorers' ? 'block' : 'none';

      // Load data for this panel (uses current league, respects cache)
      if      (name === 'results')    loadResults();
      else if (name === 'fixtures')   loadFixtures();
      else if (name === 'table')      loadTable();
      else if (name === 'topscorers') loadTopScorers();
    }

    // ─────────────────────────────────────────
    //  LEAGUE SELECTION
    //  Only ever touches league-tab button styles
    //  and triggers a data refresh for the active panel.
    //  Never touches top-tab buttons or top-tab state,
    //  except hiding the Table tab for knockout competitions.
    // ─────────────────────────────────────────
    function setLeague(id) {
      activeLeague = id;

      // Update league-tab active class
      document.querySelectorAll('.league-tab').forEach(function(b) {
        b.classList.toggle('active', b.id === 'ltab-' + id);
      });

      // Hide Table top-tab for knockout competitions (no standings exist)
      var tableTopTab = document.getElementById('toptab-table');
      if (KNOCKOUTS.indexOf(id) !== -1) {
        tableTopTab.style.display = 'none';
        // If user was on Table tab, switch them to Results
        if (activeContentTab === 'table') {
          showContentTab('results');
          return;
        }
      } else {
        tableTopTab.style.display = '';
      }

      // Refresh data for whatever content tab is currently active
      if      (activeContentTab === 'results')    loadResults();
      else if (activeContentTab === 'fixtures')   loadFixtures();
      else if (activeContentTab === 'table')      loadTable();
      else if (activeContentTab === 'topscorers') loadTopScorers();
    }

    // ─────────────────────────────────────────
    //  HELPERS
    // ─────────────────────────────────────────
    function fmtDate(iso) {
      if (!iso) return '';
      return new Date(iso).toLocaleDateString('en-GB', { weekday:'short', day:'numeric', month:'short' });
    }
    function fmtTime(iso) {
      if (!iso) return '';
      return new Date(iso).toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' });
    }
    function loadingHtml() {
      return '<div class="loading-state"><div class="loading-dots"><span></span><span></span><span></span></div></div>';
    }

    // ─────────────────────────────────────────
    //  RESULTS
    // ─────────────────────────────────────────
    async function loadResults() {
      var league = activeLeague;
      var cached = getCached(league, 'results');
      if (cached) { renderResults(cached, league); return; }

      var el = document.getElementById('results-container');
      el.innerHTML = loadingHtml();
      try {
        var res  = await fetch('/.netlify/functions/results?league=' + league);
        var data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Failed');
        var fixtures = data.fixtures || [];
        setCache(league, 'results', fixtures);
        // Only render if still on this league (user may have switched)
        if (activeLeague === league) renderResults(fixtures, league);
      } catch(e) {
        if (activeLeague === league)
          el.innerHTML = '<div class="empty-state">Could not load results. Please try again later.</div>';
      }
    }

    function renderResults(fixtures, league) {
      var el = document.getElementById('results-container');
      if (!fixtures.length) {
        el.innerHTML = '<div class="empty-state">No results available for this competition.</div>';
        return;
      }
      var leagueName = LEAGUE_NAMES[league] || 'Scottish Football';
      var groups = {};
      fixtures.forEach(function(f) {
        var dateLabel = f.date ? fmtDate(f.date) : 'Recent';
        var roundLabel = normaliseRoundLabel(f.round);
        var k = dateLabel + '||' + roundLabel;
        if (!groups[k]) groups[k] = [];
        groups[k].push(f);
      });
      var html = '';
      Object.entries(groups).forEach(function([groupKey, matches]) {
        var parts = groupKey.split('||');
        var date = parts[0];
        var round = parts[1] || '';
        var count = matches.length;
        html += '<div class="league-group"><div class="league-header"><div class="league-header-top"><div class="league-badge"></div><div class="league-name">' + leagueName + '</div></div><div class="league-meta"><div class="league-date">' + date + '</div><div class="league-submeta">' + (round ? '<span class="league-round">' + round + '</span>' : '') + '<span class="league-count">' + count + ' ' + (count === 1 ? 'match' : 'matches') + '</span></div></div></div><div class="match-grid">';
        matches.forEach(function(f) {
          var hw = parseInt(f.score.home) > parseInt(f.score.away);
          var aw = parseInt(f.score.away) > parseInt(f.score.home);
          var live = ['LIVE','1H','2H','HT','PEN'].indexOf(f.state) !== -1;
          var status = live ? '<span class="match-status live">Live</span>' : '<span class="match-status">FT</span>';
          var time   = f.date ? '<span class="match-time">' + fmtTime(f.date) + '</span>' : '';
          html += '<div class="match-card" role="link" tabindex="0" data-match-href="match.html?id=' + f.id + '&from=results&league=' + encodeURIComponent(league) + '"><div class="match-teams">'
            + '<div class="match-team">'
            + buildClubLink(f.home, league, 'result-team-link', 'team-name' + (hw?' winner':''), 'result-crest')
            + '<span class="team-score' + (hw?' winner':'') + '">' + f.score.home + '</span></div>'
            + '<div class="match-team">'
            + buildClubLink(f.away, league, 'result-team-link', 'team-name' + (aw?' winner':''), 'result-crest')
            + '<span class="team-score' + (aw?' winner':'') + '">' + f.score.away + '</span></div>'
            + '</div><div class="match-meta">' + status + time + '</div></div>';
        });
        html += '</div></div>';
      });
      el.innerHTML = html;
    }

    // ─────────────────────────────────────────
    //  FIXTURES
    // ─────────────────────────────────────────
    async function loadFixtures() {
      var league = activeLeague;
      var cached = getCached(league, 'fixtures');
      if (cached) { renderFixtures(cached); return; }

      var el = document.getElementById('fixtures-container');
      el.innerHTML = loadingHtml();
      try {
        var res  = await fetch('/.netlify/functions/fixtures?league=' + league);
        var data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Failed');
        var fixtures = data.fixtures || [];
        setCache(league, 'fixtures', fixtures);
        if (activeLeague === league) renderFixtures(fixtures);
      } catch(e) {
        if (activeLeague === league)
          el.innerHTML = '<div class="empty-state">Could not load fixtures. Please try again later.</div>';
      }
    }

    function renderFixtures(fixtures) {
      var el = document.getElementById('fixtures-container');
      if (!fixtures.length) {
        el.innerHTML = '<div class="empty-state">No upcoming fixtures for this competition.</div>';
        return;
      }
      var groups = {};
      fixtures.forEach(function(f) {
        var k = f.date ? fmtDate(f.date) : 'TBC';
        if (!groups[k]) groups[k] = [];
        groups[k].push(f);
      });
      var html = '';
      Object.entries(groups).forEach(function([date, matches]) {
        html += '<div class="date-group"><div class="date-header"><div class="date-label">' + date + '</div></div>';
        matches.forEach(function(f) {
          var t = f.date ? fmtTime(f.date) : 'TBC';
          html += '<div class="fixture-row"><div class="fixture-time">' + t + '</div><div class="fixture-teams"><div class="fixture-home">' + f.home.name + '</div><div class="fixture-vs">vs</div><div class="fixture-away">' + f.away.name + '</div></div></div>';
        });
        html += '</div>';
      });
      el.innerHTML = html;
    }

    // ─────────────────────────────────────────
    //  TABLE
    // ─────────────────────────────────────────
    async function loadTable() {
      var league = activeLeague;
      var cached = getCached(league, 'table');
      if (cached) { renderTable(cached, league); return; }

      var el = document.getElementById('table-container');
      el.innerHTML = loadingHtml();
      try {
        var res  = await fetch('/.netlify/functions/standings?league=' + league);
        var data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Failed');
        var standings = data.standings || [];
        setCache(league, 'table', standings);
        if (activeLeague === league) renderTable(standings, league);
      } catch(e) {
        if (activeLeague === league)
          el.innerHTML = '<div class="empty-state">Could not load standings. Please try again later.</div>';
      }
    }

    function renderTable(standings, league) {
      var el = document.getElementById('table-container');
      if (!standings.length) {
        el.innerHTML = '<div class="empty-state">Standings not available.</div>';
        return;
      }
      var name = LEAGUE_NAMES[league] || 'League Table';
      // Premiership splits top 6 / bottom 6 after 33 games
      var splitAfter = league === '501' ? 6 : 0;

      var html = '<div class="league-header" style="border-bottom:1px solid #2a2b2d">'
        + '<div class="league-badge"></div>'
        + '<div class="league-name">' + name + ' 2025/26</div>'
        + '</div>'
        + '<table class="standings-table"><thead><tr>'
        + '<th class="pos">#</th><th>Club</th>'
        + '<th class="num">PL</th><th class="num">W</th><th class="num">D</th><th class="num">L</th>'
        + '<th class="num">GD</th><th class="num">PTS</th>'
        + '</tr></thead><tbody>';

      standings.forEach(function(row, i) {
        var pos    = row.position;
        // European spots: top 3 for Premiership; relegation: bottom 2
        var zone   = (league === '501' && pos <= 3) ? 'zone-europe'
                   : (pos > standings.length - 2) ? 'zone-relegation'
                   : '';
        var split  = (splitAfter && pos === splitAfter + 1) ? 'split-row' : '';
        var gd     = row.gd > 0 ? '+' + row.gd : '' + row.gd;
        var crest  = row.crest
          ? '<img class="team-crest" src="' + row.crest + '" alt="" loading="lazy" onerror="this.style.display=\'none\'">'
          : '';
        html += '<tr class="' + zone + ' ' + split + '">'
          + '<td class="pos">' + pos + '</td>'
          + '<td class="team-cell">' + (row.teamId ? buildClubLink({ id: row.teamId, name: row.team, crest: row.crest }, league, 'table-team-link', 'team-name', 'team-crest') : crest + row.team) + '</td>'
          + '<td class="num">' + row.played + '</td>'
          + '<td class="num">' + row.won + '</td>'
          + '<td class="num">' + row.drawn + '</td>'
          + '<td class="num">' + row.lost + '</td>'
          + '<td class="num">' + gd + '</td>'
          + '<td class="pts">' + row.points + '</td>'
          + '</tr>';
      });

      html += '</tbody></table>'
        + '<div style="padding:0.6rem 1.25rem;font-size:11px;color:#444;border-top:1px solid #2a2b2d;display:flex;gap:16px;">'
        + '<span><span style="display:inline-block;width:3px;height:12px;background:#4caf50;margin-right:5px;border-radius:1px;vertical-align:middle"></span>European</span>'
        + '<span><span style="display:inline-block;width:3px;height:12px;background:#e84040;margin-right:5px;border-radius:1px;vertical-align:middle"></span>Relegation</span>'
        + '</div>';
      el.innerHTML = html;
    }

    // ─────────────────────────────────────────
    //  TOP SCORERS
    // ─────────────────────────────────────────
    async function loadTopScorers() {
      var league = activeLeague;
      var el = document.getElementById('topscorers-container');

      if (KNOCKOUTS.indexOf(league) !== -1) {
        el.innerHTML = '<div class="empty-state">Top scorers not available for cup competitions</div>';
        return;
      }

      var cached = getCached(league, 'topscorers');
      if (cached) { renderTopScorers(cached, league); return; }

      el.innerHTML = loadingHtml();
      try {
        var res = await fetch('/.netlify/functions/top-scorers?leagueId=' + league);
        var data = await res.json();
        var scorers = Array.isArray(data) ? data : [];
        setCache(league, 'topscorers', scorers);
        if (activeLeague === league) renderTopScorers(scorers, league);
      } catch (e) {
        if (activeLeague === league) {
          el.innerHTML = '<div class="empty-state">Could not load top scorers. Please try again later.</div>';
        }
      }
    }

    function renderTopScorers(scorers, league) {
      var el = document.getElementById('topscorers-container');
      if (!scorers.length) {
        el.innerHTML = '<div class="empty-state">Top scorers not available for this competition.</div>';
        return;
      }

      var name = LEAGUE_NAMES[league] || 'Top Scorers';
      var html = '<div class="league-header" style="border-bottom:1px solid #2a2b2d">'
        + '<div class="league-badge"></div>'
        + '<div class="league-name">' + name + ' top scorers</div>'
        + '</div>'
        + '<table class="standings-table scorers-table"><thead><tr>'
        + '<th class="num">#</th><th>Player</th><th>Club</th><th class="num">Goals</th>'
        + '</tr></thead><tbody>';

      scorers.forEach(function(row, index) {
        var crest = row.teamCrest
          ? '<img class="scorer-crest" src="' + row.teamCrest + '" alt="" loading="lazy" onerror="this.style.display=\'none\'">'
          : '';
        html += '<tr>'
          + '<td class="rank">' + (index + 1) + '</td>'
          + '<td class="player-cell">' + (row.playerName || '') + '</td>'
          + '<td class="team-cell-light"><span class="scorer-team-wrap">' + crest + (row.teamName || '') + '</span></td>'
          + '<td class="goals">' + (row.goals || 0) + '</td>'
          + '</tr>';
      });

      html += '</tbody></table>';
      el.innerHTML = html;
    }

    // ─────────────────────────────────────────
    //  INIT — load results on page load
    // ─────────────────────────────────────────
    (function() {
      var nav = document.querySelector('.nav');
      if (!nav) return;
      window.addEventListener('scroll', function() {
        nav.classList.toggle('scrolled', window.scrollY > 24);
      }, { passive: true });
    })();

    document.addEventListener('click', function(event) {
      if (event.target.closest('a, button')) return;
      var card = event.target.closest('[data-match-href]');
      if (!card) return;
      window.location.href = card.getAttribute('data-match-href');
    });

    document.addEventListener('keydown', function(event) {
      if ((event.key !== 'Enter' && event.key !== ' ') || !event.target.matches('[data-match-href]')) return;
      event.preventDefault();
      window.location.href = event.target.getAttribute('data-match-href');
    });

    loadResults();
  </script>
</body>
</html>
