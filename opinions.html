<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">
  <title>Opinions — Far Post</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/farpost.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #111213; color: #e8e6e1; font-family: 'Barlow', sans-serif; min-height: 100vh; }
    .nav { position: sticky; top: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 0 1.25rem; height: 52px; border-bottom: 1px solid #2a2b2d; background: rgba(13,14,15,0.96); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); transition: height 0.2s ease, box-shadow 0.2s ease; }
    .nav.scrolled { height: 44px; box-shadow: 0 2px 24px rgba(0,0,0,0.5); border-bottom-color: #1a1b1d; }
    .logo { font-family: 'Barlow Condensed', sans-serif; font-size: 26px; font-weight: 700; letter-spacing: 0.12em; color: #e8e6e1; text-decoration: none; white-space: nowrap; transition: font-size 0.2s; }
    .nav.scrolled .logo { font-size: 22px; }
    .logo-dot { color: #e84040; }
    .nav-links { display: flex; gap: 20px; }
    .nav-links a { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 600; letter-spacing: 0.08em; text-decoration: none; color: #888; text-transform: uppercase; }
    .nav-links a:hover { color: #e8e6e1; }
    .nav-links a.active { color: #e8e6e1; border-bottom: 2px solid #e84040; padding-bottom: 2px; }
    .nav-hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; padding: 4px; background: none; border: none; flex-shrink: 0; }
    .nav-hamburger span { display: block; width: 22px; height: 2px; background: #888; }
    .mobile-menu { display: none; flex-direction: column; background: rgba(13,14,15,0.98); border-bottom: 1px solid #2a2b2d; position: sticky; top: 52px; z-index: 99; }
    .mobile-menu.open { display: flex; }
    .mobile-menu a { font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: #888; text-decoration: none; padding: 0.875rem 1.25rem; border-bottom: 1px solid #1a1b1d; }
    .mobile-menu a:last-child { border-bottom: none; }

    .page-header { padding: 2rem 1.5rem 1.5rem; border-bottom: 1px solid #2a2b2d; }
    .page-title { font-family: 'Barlow Condensed', sans-serif; font-size: 48px; font-weight: 700; letter-spacing: 0.02em; color: #e8e6e1; }
    .page-title span { color: #e84040; }
    .page-subtitle { font-size: 14px; color: #555; margin-top: 6px; }

    .filter-bar { display: flex; gap: 0; border-bottom: 1px solid #2a2b2d; overflow-x: auto; }
    .filter-btn { font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: #555; background: none; border: none; border-right: 1px solid #2a2b2d; padding: 0.6rem 1.25rem; cursor: pointer; white-space: nowrap; transition: all 0.15s; }
    .filter-btn:hover { color: #e8e6e1; background: #161718; }
    .filter-btn.active { color: #e84040; background: #161718; }

    .news-grid { display: grid; grid-template-columns: repeat(3, 1fr); border-bottom: 1px solid #2a2b2d; }
    .news-card { border-right: 1px solid #2a2b2d; border-bottom: 1px solid #2a2b2d; cursor: pointer; transition: background 0.15s; text-decoration: none; display: block; overflow: hidden; }
    .news-card:nth-child(3n) { border-right: none; }
    .news-card:hover { background: #161718; }
    .news-card-image { width: 100%; height: 200px; object-fit: cover; display: block; }
    .news-card-image-placeholder { width: 100%; height: 200px; background: #1a1b1c; display: block; }
    .news-card-body { padding: 1.25rem; }
    .news-label { font-family: 'Barlow Condensed', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; color: #e84040; margin-bottom: 8px; }
    .news-headline { font-family: 'Barlow Condensed', sans-serif; font-size: 22px; font-weight: 700; line-height: 1.1; color: #e8e6e1; margin-bottom: 10px; }
    .news-excerpt { font-size: 13px; color: #777; line-height: 1.6; margin-bottom: 12px; }
    .news-author { display: flex; align-items: center; gap: 8px; }
    .author-avatar { width: 24px; height: 24px; border-radius: 50%; background: #2a2b2d; display: flex; align-items: center; justify-content: center; font-family: 'Barlow Condensed', sans-serif; font-size: 10px; font-weight: 700; color: #888; flex-shrink: 0; }
    .author-name { font-size: 11px; color: #555; }

    .load-more { display: flex; justify-content: center; padding: 2rem; border-bottom: 1px solid #2a2b2d; }
    .load-more-btn { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #888; border: 1px solid #2a2b2d; background: none; padding: 10px 24px; border-radius: 2px; cursor: pointer; transition: all 0.15s; }
    .load-more-btn:hover { color: #e8e6e1; border-color: #555; }
    .load-more-btn:disabled { opacity: 0.4; cursor: default; }

    .loading-text { font-size: 12px; color: #555; padding: 3rem; text-align: center; grid-column: 1/-1; }
    .empty-text { font-size: 14px; color: #555; padding: 3rem; text-align: center; grid-column: 1/-1; }

    .footer { padding: 1.25rem; border-top: 1px solid #2a2b2d; background: #0d0e0f; display: flex; align-items: center; justify-content: space-between; }
    .footer-logo { font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 700; letter-spacing: 0.12em; color: #333; }
    .footer-logo span { color: #e84040; }
    .footer-copy { font-size: 12px; color: #444; }

    @media (max-width: 680px) {
      .nav-links { display: none; }
      .nav-hamburger { display: flex; }
      .page-header { padding: 1.5rem 1.25rem 1rem; }
      .page-title { font-size: 36px; }
      .news-grid { grid-template-columns: 1fr; }
      .news-card { border-right: none; }
      .news-card:nth-child(3n) { border-right: none; }
      .footer { flex-direction: column; gap: 6px; text-align: center; }
    }

    @media (min-width: 681px) and (max-width: 1024px) {
      .news-grid { grid-template-columns: repeat(2, 1fr); }
      .news-card:nth-child(3n) { border-right: 1px solid #2a2b2d; }
      .news-card:nth-child(2n) { border-right: none; }
    }
  </style>
</head>
<body>

  <nav class="nav">
    <a href="index.html" class="logo">FAR POST<span class="logo-dot">.</span></a>
    <div class="nav-links">
      <a href="news.html">News</a>
      <a href="opinions.html" class="active">Opinions</a>
      <a href="podcasts.html">Podcasts</a>
      <a href="clubs.html">Clubs</a>
      <a href="players.html">Players</a>
      <a href="results.html">Results</a>
      <a href="fixtures.html">Fixtures</a>
    </div>
    <button class="nav-hamburger" onclick="document.getElementById('mobile-menu').classList.toggle('open')" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <div class="mobile-menu" id="mobile-menu">
    <a href="news.html">News</a>
    <a href="opinions.html">Opinions</a>
    <a href="podcasts.html">Podcasts</a>
    <a href="clubs.html">Clubs</a>
    <a href="players.html">Players</a>
    <a href="results.html">Results</a>
    <a href="fixtures.html">Fixtures</a>
  </div>

  <div class="page-header">
    <div class="page-title">Opinions & <span>Features</span></div>
    <div class="page-subtitle">Takes, analysis and long reads from Far Post</div>
  </div>

  <div class="filter-bar">
    <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
    <button class="filter-btn" onclick="setFilter('opinion', this)">Opinion</button>
    <button class="filter-btn" onclick="setFilter('analysis', this)">Analysis</button>
    <button class="filter-btn" onclick="setFilter('feature', this)">Feature</button>
    <button class="filter-btn" onclick="setFilter('interview', this)">Interview</button>
  </div>

  <div class="news-grid" id="news-grid">
    <div class="loading-text">Loading articles...</div>
  </div>

  <div class="load-more" id="load-more" style="display:none;">
    <button class="load-more-btn" id="load-more-btn" onclick="loadMore()">Load more</button>
  </div>

  <footer class="footer">
    <div class="footer-logo">FAR POST<span>.</span></div>
    <div class="footer-copy">Scottish football. No filter.</div>
  </footer>

  <script src="/assets/farpost.js"></script>
  <script>
    const { fetchJson, renderState, setHTML, storyCardMarkup } = window.FarPost;

    let offset = 0;
    const PAGE_SIZE = 9;
    let currentFilter = 'all';

    function filterQuery() {
      if (currentFilter === 'all') return `_type=="post"&&category in ["opinion","analysis","feature","interview"]`;
      return `_type=="post"&&category=="${currentFilter}"`;
    }

    function setFilter(filter, btn) {
      currentFilter = filter;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      offset = 0;
      renderState('#news-grid', 'loading', {
        eyebrow: 'Opinion desk',
        title: 'Refreshing category',
        message: 'Loading the latest editorial.',
        fullSpan: true
      });
      document.getElementById('load-more').style.display = 'none';
      loadArticles();
    }

    function renderCards(posts) {
      return posts.map(post => storyCardMarkup(post)).join('');
    }

    async function loadArticles() {
      const grid = document.getElementById('news-grid');
      try {
        const q = encodeURIComponent(`*[${filterQuery()}]|order(publishedAt desc)[0...${PAGE_SIZE}]{_id,title,category,excerpt,author,publishedAt,mainImage}`);
        const posts = (await fetchJson(`/.netlify/functions/sanity-fetch?query=${q}`)).result;

        if (!posts?.length) {
          renderState(grid, 'empty', {
            eyebrow: 'Opinion desk',
            title: 'No articles in this category',
            message: 'Try another filter or check back when new commentary lands.',
            fullSpan: true
          });
          return;
        }

        setHTML(grid, renderCards(posts));
        offset = posts.length;

        if (posts.length === PAGE_SIZE) {
          document.getElementById('load-more').style.display = 'flex';
        }
      } catch(e) {
        renderState(grid, 'error', {
          eyebrow: 'Opinion desk',
          title: 'Could not load articles',
          message: 'Please try again in a moment.',
          fullSpan: true
        });
      }
    }

    async function loadMore() {
      const btn = document.getElementById('load-more-btn');
      const grid = document.getElementById('news-grid');
      btn.disabled = true;
      btn.textContent = 'Loading...';
      try {
        const q = encodeURIComponent(`*[${filterQuery()}]|order(publishedAt desc)[${offset}...${offset+PAGE_SIZE}]{_id,title,category,excerpt,author,publishedAt,mainImage}`);
        const posts = (await fetchJson(`/.netlify/functions/sanity-fetch?query=${q}`)).result;
        if (!posts?.length) { document.getElementById('load-more').style.display='none'; return; }
        grid.insertAdjacentHTML('beforeend', renderCards(posts));
        offset += posts.length;
        if (posts.length < PAGE_SIZE) document.getElementById('load-more').style.display='none';
      } catch(e) {}
      btn.disabled = false;
      btn.textContent = 'Load more';
    }

    (function() {
      var nav = document.querySelector('.nav');
      if (!nav) return;
      window.addEventListener('scroll', function() {
        nav.classList.toggle('scrolled', window.scrollY > 24);
      }, { passive: true });
    })();

    loadArticles();
  </script>
</body>
</html>
