<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">
  <title>Fixtures — Far Post</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #111213; color: #e8e6e1; font-family: 'Barlow', sans-serif; min-height: 100vh; }

    .nav { position: sticky; top: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 0 1.25rem; height: 52px; border-bottom: 1px solid #2a2b2d; background: rgba(13,14,15,0.96); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); transition: height 0.2s ease, box-shadow 0.2s ease; }
    .nav.scrolled { height: 44px; box-shadow: 0 2px 24px rgba(0,0,0,0.5); border-bottom-color: #1a1b1d; }
    .logo { font-family: 'Barlow Condensed', sans-serif; font-size: 26px; font-weight: 700; letter-spacing: 0.12em; color: #e8e6e1; text-decoration: none; white-space: nowrap; transition: font-size 0.2s; }
    .nav.scrolled .logo { font-size: 22px; }
    .logo-dot { color: #e84040; }
    .nav-links { display: flex; gap: 20px; }
    .nav-links a { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 600; letter-spacing: 0.08em; text-decoration: none; color: #888; text-transform: uppercase; }
    .nav-links a:hover { color: #e8e6e1; }
    .nav-links a.active { color: #e8e6e1; border-bottom: 2px solid #e84040; padding-bottom: 2px; }
    .nav-hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; padding: 4px; background: none; border: none; flex-shrink: 0; }
    .nav-hamburger span { display: block; width: 22px; height: 2px; background: #888; }
    .mobile-menu { display: none; flex-direction: column; background: rgba(13,14,15,0.98); border-bottom: 1px solid #2a2b2d; position: sticky; top: 52px; z-index: 99; }
    .mobile-menu.open { display: flex; }
    .mobile-menu a { font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: #888; text-decoration: none; padding: 0.875rem 1.25rem; border-bottom: 1px solid #1a1b1d; }
    .mobile-menu a:last-child { border-bottom: none; }

    .page-header { padding: 2rem 1.5rem 1.5rem; border-bottom: 1px solid #2a2b2d; }
    .page-title { font-family: 'Barlow Condensed', sans-serif; font-size: 48px; font-weight: 800; letter-spacing: 0.02em; color: #e8e6e1; }
    .page-title span { color: #e84040; }
    .page-subtitle { font-size: 14px; color: #555; margin-top: 4px; }

    .filter-bar { display: flex; gap: 0; border-bottom: 1px solid #2a2b2d; background: #0d0e0f; overflow-x: auto; }
    .filter-btn { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: #555; background: none; border: none; border-right: 1px solid #2a2b2d; padding: 0.5rem 1.25rem; cursor: pointer; white-space: nowrap; transition: all 0.15s; }
    .filter-btn:hover { color: #e8e6e1; background: #161718; }
    .filter-btn.active { color: #e84040; background: #161718; }

    .section-header { display: flex; align-items: center; justify-content: space-between; padding: 0.6rem 1.25rem; border-bottom: 1px solid #2a2b2d; background: #0d0e0f; }
    .section-title { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: #555; }
    .section-title span { color: #e84040; margin-right: 8px; }

    .fixtures-container { border-bottom: 1px solid #2a2b2d; padding: 1rem; }
    .date-group { margin-bottom: 1rem; border: 1px solid #2a2b2d; background: linear-gradient(180deg, #111214 0%, #0f1011 100%); box-shadow: inset 0 1px 0 rgba(255,255,255,0.02); }
    .date-group:last-child { margin-bottom: 0; }
    .date-header { padding: 1rem 1.25rem 0.95rem; background: linear-gradient(180deg, #161718 0%, #0d0e0f 100%); border-bottom: 1px solid #2a2b2d; display: flex; flex-direction: column; gap: 0.8rem; }
    .date-header-top { display: flex; align-items: center; gap: 12px; }
    .date-badge { width: 8px; height: 8px; border-radius: 50%; background: #e84040; flex-shrink: 0; box-shadow: 0 0 0 4px rgba(232,64,64,0.12); }
    .date-league { font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; color: #f1efe9; line-height: 1; }
    .date-meta { display: flex; align-items: center; justify-content: space-between; gap: 0.75rem; flex-wrap: wrap; }
    .date-label { font-family: 'Barlow Condensed', sans-serif; font-size: 15px; font-weight: 600; letter-spacing: 0.05em; color: #bcb6ae; }
    .date-submeta { display: flex; align-items: center; gap: 0.6rem; flex-wrap: wrap; }
    .date-round { display: inline-flex; align-items: center; padding: 0.22rem 0.6rem; border: 1px solid #3a2b2b; background: rgba(232,64,64,0.09); font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: #ef9f9f; }
    .date-count { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: #666; }

    .fixture-row { display: grid; grid-template-columns: 60px 1fr auto; align-items: center; padding: 1rem 1.25rem; border-bottom: 1px solid #1a1b1d; transition: background 0.15s; gap: 16px; text-decoration: none; color: inherit; }
    .fixture-row:last-child { border-bottom: none; }
    .fixture-row:hover { background: #161718; }
    .fixture-row:focus-visible { outline: 2px solid #e84040; outline-offset: -2px; }

    .fixture-time { font-family: 'Barlow Condensed', sans-serif; font-size: 15px; font-weight: 700; color: #e84040; }
    .fixture-time.tbc { color: #444; }

    .fixture-centre { display: flex; align-items: center; gap: 0; }
    .fixture-home { font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 700; color: #e8e6e1; flex: 1; text-align: right; display: flex; align-items: center; justify-content: flex-end; gap: 8px; }
    .fixture-vs { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; color: #333; padding: 0 16px; white-space: nowrap; }
    .fixture-away { font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 700; color: #e8e6e1; flex: 1; display: flex; align-items: center; gap: 8px; }
    .fixture-crest { width: 20px; height: 20px; object-fit: contain; flex-shrink: 0; }
    .club-link { display: inline-flex; align-items: center; gap: 8px; min-width: 0; color: inherit; text-decoration: none; border-radius: 3px; transition: color 0.15s ease; }
    .club-link:hover { color: #fff; }
    .club-link:focus-visible { outline: 2px solid #e84040; outline-offset: 2px; }

    .fixture-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 3px; min-width: 120px; }
    .fixture-league-tag { font-family: 'Barlow Condensed', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: #444; }
    .fixture-venue-tag { font-size: 11px; color: #333; }

    .empty-state { padding: 3rem 1.25rem; text-align: center; color: #555; font-size: 14px; border-bottom: 1px solid #2a2b2d; }
    .loading-state { padding: 2rem 1.25rem; text-align: center; border-bottom: 1px solid #2a2b2d; }
    .loading-dots { display: inline-flex; gap: 6px; }
    .loading-dots span { width: 6px; height: 6px; border-radius: 50%; background: #e84040; animation: pulse 1.2s ease-in-out infinite; }
    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse { 0%,80%,100% { opacity: 0.2; } 40% { opacity: 1; } }

    .footer { padding: 1.25rem; border-top: 1px solid #2a2b2d; background: #0d0e0f; display: flex; align-items: center; justify-content: space-between; }
    .footer-logo { font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 700; letter-spacing: 0.12em; color: #333; }
    .footer-logo span { color: #e84040; }
    .footer-copy { font-size: 12px; color: #444; }

    @media (max-width: 680px) {
      .nav-links { display: none; }
      .nav-hamburger { display: flex; }
      .page-header { padding: 1.5rem 1.25rem 1rem; }
      .page-title { font-size: 36px; }
      .fixtures-container { padding: 0.75rem; }
      .date-group { margin-bottom: 0.75rem; }
      .date-header { padding: 0.9rem 1rem 0.85rem; gap: 0.7rem; }
      .date-league { font-size: 16px; }
      .date-label { font-size: 14px; }
      .fixture-row { grid-template-columns: 50px 1fr; }
      .fixture-meta { display: none; }
      .fixture-home { font-size: 15px; }
      .fixture-away { font-size: 15px; }
      .fixture-vs { padding: 0 10px; }
      .footer { flex-direction: column; gap: 6px; text-align: center; }
    }
  </style>
</head>
<body>

  <nav class="nav">
    <a href="index.html" class="logo">FAR POST<span class="logo-dot">.</span></a>
    <div class="nav-links">
      <a href="news.html">News</a>
      <a href="opinions.html">Opinions</a>
      <a href="podcasts.html">Podcasts</a>
      <a href="clubs.html">Clubs</a>
      <a href="players.html">Players</a>
      <a href="results.html">Results</a>
      <a href="fixtures.html" class="active">Fixtures</a>
    </div>
    <button class="nav-hamburger" onclick="document.getElementById('mobile-menu').classList.toggle('open')" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <div class="mobile-menu" id="mobile-menu">
    <a href="news.html">News</a>
    <a href="opinions.html">Opinions</a>
    <a href="podcasts.html">Podcasts</a>
    <a href="clubs.html">Clubs</a>
    <a href="players.html">Players</a>
    <a href="results.html">Results</a>
    <a href="fixtures.html">Fixtures</a>
  </div>

  <div class="page-header">
    <div class="page-title">Upcoming <span>Fixtures</span></div>
    <div class="page-subtitle">Scottish football — next 30 days</div>
  </div>

  <div class="filter-bar">
    <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
    <button class="filter-btn" onclick="setFilter('501', this)">Premiership</button>
    <button class="filter-btn" onclick="setFilter('504', this)">Championship</button>
    <button class="filter-btn" onclick="setFilter('507', this)">Scottish Cup</button>
    <button class="filter-btn" onclick="setFilter('510', this)">League Cup</button>
    <button class="filter-btn" onclick="setFilter('516', this)">League One</button>
  </div>

  <div class="section-header">
    <div class="section-title"><span>//</span>Upcoming fixtures</div>
  </div>

  <div class="fixtures-container" id="fixtures-container">
    <div class="loading-state"><div class="loading-dots"><span></span><span></span><span></span></div></div>
  </div>

  <footer class="footer">
    <div class="footer-logo">FAR POST<span>.</span></div>
    <div class="footer-copy">Scottish football. No filter.</div>
  </footer>

  <script>
    const LEAGUE_NAMES = {
      '501': 'Premiership',
      '504': 'Championship',
      '507': 'Scottish Cup',
      '510': 'League Cup',
      '516': 'League One'
    };

    let allFixtures = [];
    let currentFilter = 'all';

    function fmtDate(isoStr) {
      if (!isoStr) return 'TBC';
      return new Date(isoStr).toLocaleDateString('en-GB', { weekday:'short', day:'numeric', month:'short' });
    }
    function fmtTime(isoStr) {
      if (!isoStr) return 'TBC';
      return new Date(isoStr).toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' });
    }

    function buildClubHref(teamId, leagueId) {
      if (!teamId || !leagueId) return '';
      return 'club.html?id=' + encodeURIComponent(teamId) + '&league=' + encodeURIComponent(leagueId);
    }

    function buildClubLink(team, leagueId) {
      const crest = team.crest ? `<img class="fixture-crest" src="${team.crest}" alt="" onerror="this.style.display='none'">` : '';
      const name = `<span>${team.name}</span>`;
      const href = buildClubHref(team.id, leagueId);
      if (!href) return `${crest}${name}`;
      return `<a class="club-link" href="${href}" aria-label="View ${team.name} club page">${crest}${name}</a>`;
    }

    function normaliseRoundLabel(round) {
      if (!round) return '';
      const cleaned = String(round).trim();
      if (!cleaned) return '';
      return /round|matchday|week|quarter|semi|final/i.test(cleaned) ? cleaned : `Round ${cleaned}`;
    }

    function setFilter(filter, btn) {
      currentFilter = filter;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderFixtures(allFixtures);
    }

    function renderFixtures(fixtures) {
      const container = document.getElementById('fixtures-container');
      const filtered = currentFilter === 'all' ? fixtures : fixtures.filter(f => f.leagueId === currentFilter);

      if (!filtered.length) {
        container.innerHTML = '<div class="empty-state">No upcoming fixtures for this competition.</div>';
        return;
      }

      // Group by date
      const groups = {};
      filtered.forEach(f => {
        const dateLabel = f.date ? fmtDate(f.date) : 'TBC';
        const roundLabel = normaliseRoundLabel(f.round);
        const key = [f.leagueId, dateLabel, roundLabel].join('||');
        if (!groups[key]) groups[key] = [];
        groups[key].push(f);
      });

      let html = '';
      Object.entries(groups).forEach(([groupKey, matches]) => {
        const count = matches.length;
        const [leagueId, date, round] = groupKey.split('||');
        const leagueName = LEAGUE_NAMES[leagueId] || 'Scottish Football';
        html += `<div class="date-group">
          <div class="date-header">
            <div class="date-header-top">
              <div class="date-badge"></div>
              <div class="date-league">${leagueName}</div>
            </div>
            <div class="date-meta">
              <div class="date-label">${date}</div>
              <div class="date-submeta">
                ${round ? `<div class="date-round">${round}</div>` : ''}
                <div class="date-count">${count} ${count === 1 ? 'match' : 'matches'}</div>
              </div>
            </div>
          </div>`;

        matches.forEach(f => {
          const timeStr = f.date ? fmtTime(f.date) : 'TBC';
          const timeClass = timeStr === 'TBC' ? 'fixture-time tbc' : 'fixture-time';
          html += `<div class="fixture-row" role="link" tabindex="0" data-match-href="match.html?id=${f.id}&from=fixtures&league=${encodeURIComponent(f.leagueId)}">
            <div class="${timeClass}">${timeStr}</div>
            <div class="fixture-centre">
              <div class="fixture-home">
                ${buildClubLink(f.home, f.leagueId)}
              </div>
              <div class="fixture-vs">vs</div>
              <div class="fixture-away">
                ${buildClubLink(f.away, f.leagueId)}
              </div>
            </div>
            <div class="fixture-meta">
              <div class="fixture-league-tag">${leagueName}</div>
            </div>
          </div>`;
        });

        html += `</div>`;
      });

      container.innerHTML = html;
    }

    async function loadFixtures() {
      const container = document.getElementById('fixtures-container');
      try {
        // Fetch both leagues (all) — filter client-side via the filter bar
        const res = await fetch('/.netlify/functions/fixtures?league=all');
        if (!res.ok) throw new Error('Failed');
        const data = await res.json();
        allFixtures = data.fixtures || [];
        if (!allFixtures.length) throw new Error('No fixtures');
        renderFixtures(allFixtures);
      } catch(e) {
        container.innerHTML = '<div class="empty-state">Could not load fixtures. Please try again later.</div>';
      }
    }

    (function() {
      var nav = document.querySelector('.nav');
      if (!nav) return;
      window.addEventListener('scroll', function() {
        nav.classList.toggle('scrolled', window.scrollY > 24);
      }, { passive: true });
    })();

    document.addEventListener('click', function(event) {
      if (event.target.closest('a, button')) return;
      const row = event.target.closest('[data-match-href]');
      if (!row) return;
      window.location.href = row.getAttribute('data-match-href');
    });

    document.addEventListener('keydown', function(event) {
      if ((event.key !== 'Enter' && event.key !== ' ') || !event.target.matches('[data-match-href]')) return;
      event.preventDefault();
      window.location.href = event.target.getAttribute('data-match-href');
    });

    loadFixtures();
  </script>
</body>
</html>
