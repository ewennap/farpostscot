<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">
  <title>Match — Far Post</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #111213; color: #e8e6e1; font-family: 'Barlow', sans-serif; min-height: 100vh; }

    .nav { position: sticky; top: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 0 1.25rem; height: 52px; border-bottom: 1px solid #2a2b2d; background: rgba(13,14,15,0.96); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); }
    .logo { font-family: 'Barlow Condensed', sans-serif; font-size: 26px; font-weight: 700; letter-spacing: 0.12em; color: #e8e6e1; text-decoration: none; white-space: nowrap; }
    .logo-dot { color: #e84040; }
    .nav-links { display: flex; gap: 20px; }
    .nav-links a { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 600; letter-spacing: 0.08em; text-decoration: none; color: #888; text-transform: uppercase; }
    .nav-links a:hover { color: #e8e6e1; }
    .nav-links a.active { color: #e8e6e1; border-bottom: 2px solid #e84040; padding-bottom: 2px; }
    .nav-hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; padding: 4px; background: none; border: none; flex-shrink: 0; }
    .nav-hamburger span { display: block; width: 22px; height: 2px; background: #888; }
    .mobile-menu { display: none; flex-direction: column; background: #0d0e0f; border-bottom: 1px solid #2a2b2d; }
    .mobile-menu.open { display: flex; }
    .mobile-menu a { font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: #888; text-decoration: none; padding: 0.875rem 1.25rem; border-bottom: 1px solid #1a1b1d; }
    .mobile-menu a:last-child { border-bottom: none; }

    /* ── MATCH HERO ── */
    .match-hero { background: #0d0e0f; padding: 2.5rem 1.5rem 2rem; border-bottom: 1px solid #2a2b2d; }
    .match-teams-header { display: flex; align-items: center; justify-content: center; gap: 1rem; max-width: 640px; margin: 0 auto; }
    .team-side { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 0.625rem; }
    .team-crest-hero { width: 64px; height: 64px; object-fit: contain; }
    .team-name-hero { font-family: 'Barlow Condensed', sans-serif; font-size: 17px; font-weight: 700; color: #e8e6e1; text-align: center; line-height: 1.2; }
    .score-center { display: flex; flex-direction: column; align-items: center; gap: 0.375rem; flex-shrink: 0; }
    .score-line { display: flex; align-items: center; gap: 0.5rem; }
    .score-num { font-family: 'Barlow Condensed', sans-serif; font-size: 64px; font-weight: 800; color: #e8e6e1; line-height: 1; min-width: 52px; text-align: center; }
    .score-sep { font-family: 'Barlow Condensed', sans-serif; font-size: 40px; font-weight: 300; color: #333; }
    .match-status-badge { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: #555; }
    .match-status-badge.live { color: #e84040; }

    /* ── SECTION HEADERS ── */
    .section-header { display: flex; align-items: center; padding: 0.6rem 1.25rem; border-bottom: 1px solid #2a2b2d; background: #0d0e0f; }
    .section-title { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: #555; }
    .section-title span { color: #e84040; margin-right: 8px; }

    /* ── TIMELINE ── */
    .timeline-teams-header { display: grid; grid-template-columns: 1fr 48px 1fr; padding: 0.5rem 1.25rem; border-bottom: 1px solid #1a1b1d; }
    .tl-team-label { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: #444; }
    .tl-team-label.home { text-align: right; padding-right: 10px; }
    .tl-team-label.away { padding-left: 10px; }
    .timeline-wrap { position: relative; padding: 0.5rem 0; }
    .timeline-wrap::before { content: ''; position: absolute; top: 0; bottom: 0; left: 50%; width: 1px; background: #2a2b2d; transform: translateX(-50%); pointer-events: none; }
    .tl-row { display: grid; grid-template-columns: 1fr 48px 1fr; align-items: center; padding: 0.3rem 1.25rem; position: relative; }
    .tl-home { display: flex; align-items: center; justify-content: flex-end; gap: 6px; padding-right: 10px; }
    .tl-away { display: flex; align-items: center; gap: 6px; padding-left: 10px; }
    .tl-mid { display: flex; align-items: center; justify-content: center; }
    .tl-dot { width: 30px; height: 30px; border-radius: 50%; background: #161718; border: 1px solid #2a2b2d; display: flex; align-items: center; justify-content: center; font-size: 14px; position: relative; z-index: 1; }
    .tl-content { display: flex; flex-direction: column; }
    .tl-player { font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 600; color: #e8e6e1; }
    .tl-sub-extra { font-family: 'Barlow Condensed', sans-serif; font-size: 12px; color: #555; }
    .tl-min { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; color: #555; white-space: nowrap; }
    .tl-home .tl-content { align-items: flex-end; }

    /* ── LINEUPS ── */
    .lineups-grid { display: grid; grid-template-columns: 1fr 1fr; }
    .lineup-col { padding: 1rem 1.25rem; }
    .lineup-col:first-child { border-right: 1px solid #2a2b2d; }
    .lineup-team-name { font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 700; color: #e8e6e1; padding-bottom: 0.625rem; border-bottom: 1px solid #2a2b2d; margin-bottom: 0.625rem; }
    .lineup-group-title { font-family: 'Barlow Condensed', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; color: #444; margin: 0.75rem 0 0.4rem; }
    .lineup-player { display: flex; align-items: center; gap: 8px; padding: 0.3rem 0; border-bottom: 1px solid #1a1b1d; }
    .lineup-player:last-child { border-bottom: none; }
    .lineup-jersey { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700; color: #555; min-width: 22px; text-align: center; }
    .lineup-name { font-family: 'Barlow Condensed', sans-serif; font-size: 15px; color: #e8e6e1; }

    /* ── SHARED STATES ── */
    .empty-state { padding: 2.5rem 1.25rem; text-align: center; color: #555; font-size: 14px; }
    .loading-state { padding: 2rem 1.25rem; text-align: center; }
    .loading-dots { display: inline-flex; gap: 6px; }
    .loading-dots span { width: 6px; height: 6px; border-radius: 50%; background: #e84040; animation: pulse 1.2s ease-in-out infinite; }
    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse { 0%,80%,100% { opacity: 0.2; } 40% { opacity: 1; } }

    .footer { padding: 1.25rem; border-top: 1px solid #2a2b2d; background: #0d0e0f; display: flex; align-items: center; justify-content: space-between; }
    .footer-logo { font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 700; letter-spacing: 0.12em; color: #333; }
    .footer-logo span { color: #e84040; }
    .footer-copy { font-size: 12px; color: #444; }

    @media (max-width: 680px) {
      .nav-links { display: none; }
      .nav-hamburger { display: flex; }
      .match-hero { padding: 1.75rem 1rem 1.5rem; }
      .score-num { font-size: 48px; min-width: 40px; }
      .score-sep { font-size: 32px; }
      .team-crest-hero { width: 48px; height: 48px; }
      .team-name-hero { font-size: 14px; }
      .lineups-grid { grid-template-columns: 1fr 1fr; }
      .lineup-col { padding: 0.75rem 0.75rem; }
      .lineup-name { font-size: 13px; }
      .footer { flex-direction: column; gap: 6px; text-align: center; }
    }
  </style>
</head>
<body>

  <nav class="nav">
    <a href="index.html" class="logo">FAR POST<span class="logo-dot">.</span></a>
    <div class="nav-links">
      <a href="news.html">News</a>
      <a href="opinions.html">Opinions</a>
      <a href="podcasts.html">Podcasts</a>
      <a href="results.html" class="active">Results</a>
      <a href="fixtures.html">Fixtures</a>
    </div>
    <button class="nav-hamburger" onclick="document.getElementById('mobile-menu').classList.toggle('open')" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <div class="mobile-menu" id="mobile-menu">
    <a href="news.html">News</a>
    <a href="opinions.html">Opinions</a>
    <a href="podcasts.html">Podcasts</a>
    <a href="results.html">Results</a>
    <a href="fixtures.html">Fixtures</a>
  </div>

  <!-- MATCH HERO -->
  <div class="match-hero" id="match-hero">
    <div class="loading-state"><div class="loading-dots"><span></span><span></span><span></span></div></div>
  </div>

  <!-- TIMELINE -->
  <div id="section-timeline">
    <div class="section-header">
      <div class="section-title"><span>//</span>Match timeline</div>
    </div>
    <div id="timeline-container">
      <div class="loading-state"><div class="loading-dots"><span></span><span></span><span></span></div></div>
    </div>
  </div>

  <!-- LINEUPS -->
  <div id="section-lineups">
    <div class="section-header">
      <div class="section-title"><span>//</span>Lineups</div>
    </div>
    <div id="lineups-container">
      <div class="loading-state"><div class="loading-dots"><span></span><span></span><span></span></div></div>
    </div>
  </div>

  <footer class="footer">
    <div class="footer-logo">FAR POST<span>.</span></div>
    <div class="footer-copy">Scottish football. No filter.</div>
  </footer>

  <script>
    var EVENT_ICONS = { 14: '⚽', 19: '🟨', 20: '🟥', 18: '🔄' };
    var RELEVANT_TYPES = [14, 18, 19, 20];
    var LIVE_STATES = ['LIVE', '1H', '2H', 'HT', 'PEN'];

    async function loadMatch() {
      var params = new URLSearchParams(window.location.search);
      var id = params.get('id');

      if (!id) {
        document.getElementById('match-hero').innerHTML = '<div class="empty-state">No match ID specified.</div>';
        document.getElementById('timeline-container').innerHTML = '';
        document.getElementById('lineups-container').innerHTML = '';
        return;
      }

      try {
        var res  = await fetch('/.netlify/functions/match-detail?fixtureId=' + id);
        var body = await res.json();
        if (!res.ok) throw new Error(body.error || 'Failed');

        var fixture = body.data;
        renderHero(fixture);
        renderTimeline(fixture);
        renderLineups(fixture);
      } catch (e) {
        document.getElementById('match-hero').innerHTML = '<div class="empty-state">Could not load match data. Please try again later.</div>';
        document.getElementById('timeline-container').innerHTML = '';
        document.getElementById('lineups-container').innerHTML = '';
      }
    }

    function renderHero(fixture) {
      var participants = fixture.participants || [];
      var home = participants.find(function(p) { return p.meta && p.meta.location === 'home'; }) || participants[0] || {};
      var away = participants.find(function(p) { return p.meta && p.meta.location === 'away'; }) || participants[1] || {};

      var scores    = fixture.scores || [];
      var ftScores  = scores.filter(function(s) { return s.description === 'CURRENT' || s.description === 'FT'; });
      var homeScore = ftScores.find(function(s) { return s.score && s.score.participant === 'home'; });
      var awayScore = ftScores.find(function(s) { return s.score && s.score.participant === 'away'; });
      var homeGoals = homeScore && homeScore.score && homeScore.score.goals != null ? homeScore.score.goals : '-';
      var awayGoals = awayScore && awayScore.score && awayScore.score.goals != null ? awayScore.score.goals : '-';

      var state     = fixture.state || {};
      var stateShort = state.short || '';
      var stateName  = state.name || stateShort || '';
      var isLive     = LIVE_STATES.indexOf(stateShort) !== -1;

      var homeCrest = home.image_path
        ? '<img class="team-crest-hero" src="' + home.image_path + '" alt="" onerror="this.style.display=\'none\'">'
        : '';
      var awayCrest = away.image_path
        ? '<img class="team-crest-hero" src="' + away.image_path + '" alt="" onerror="this.style.display=\'none\'">'
        : '';

      document.getElementById('match-hero').innerHTML =
        '<div class="match-teams-header">'
        + '<div class="team-side">'
        + homeCrest
        + '<div class="team-name-hero">' + (home.name || 'Home') + '</div>'
        + '</div>'
        + '<div class="score-center">'
        + '<div class="score-line">'
        + '<span class="score-num">' + homeGoals + '</span>'
        + '<span class="score-sep">-</span>'
        + '<span class="score-num">' + awayGoals + '</span>'
        + '</div>'
        + (stateName ? '<div class="match-status-badge' + (isLive ? ' live' : '') + '">' + stateName + '</div>' : '')
        + '</div>'
        + '<div class="team-side">'
        + awayCrest
        + '<div class="team-name-hero">' + (away.name || 'Away') + '</div>'
        + '</div>'
        + '</div>';

      document.title = (home.name || 'Home') + ' vs ' + (away.name || 'Away') + ' \u2014 Far Post';
    }

    function renderTimeline(fixture) {
      var el    = document.getElementById('timeline-container');
      var participants = fixture.participants || [];
      var home  = participants.find(function(p) { return p.meta && p.meta.location === 'home'; }) || participants[0] || {};
      var away  = participants.find(function(p) { return p.meta && p.meta.location === 'away'; }) || participants[1] || {};
      var homeId = home.id;

      var events = (fixture.events || [])
        .filter(function(e) { return RELEVANT_TYPES.indexOf(e.type_id) !== -1 && e.player_name; })
        .sort(function(a, b) {
          var ma = (a.minute || 0) * 100 + (a.minute_extra || 0);
          var mb = (b.minute || 0) * 100 + (b.minute_extra || 0);
          return ma - mb;
        });

      if (!events.length) {
        el.innerHTML = '<div class="empty-state">No timeline events available.</div>';
        return;
      }

      var html = '<div class="timeline-teams-header">'
        + '<div class="tl-team-label home">' + (home.short_code || home.name || 'Home') + '</div>'
        + '<div></div>'
        + '<div class="tl-team-label away">' + (away.short_code || away.name || 'Away') + '</div>'
        + '</div>'
        + '<div class="timeline-wrap">';

      events.forEach(function(e) {
        var isHome  = e.participant_id === homeId;
        var icon    = EVENT_ICONS[e.type_id] || '•';
        var minStr  = (e.minute || 0) + (e.minute_extra ? '+' + e.minute_extra : '') + '\'';
        var player  = e.player_name || '';
        var related = e.related_player_name || '';

        var contentHtml = '<div class="tl-content">'
          + (player ? '<span class="tl-player">' + player + '</span>' : '')
          + (e.type_id === 18 && related ? '<span class="tl-sub-extra">\u2191 ' + related + '</span>' : '')
          + '</div>'
          + '<span class="tl-min">' + minStr + '</span>';

        var homeContent = isHome ? contentHtml : '';
        var awayContent = !isHome ? contentHtml : '';

        html += '<div class="tl-row">'
          + '<div class="tl-home">' + homeContent + '</div>'
          + '<div class="tl-mid"><div class="tl-dot">' + icon + '</div></div>'
          + '<div class="tl-away">' + awayContent + '</div>'
          + '</div>';
      });

      html += '</div>';
      el.innerHTML = html;
    }

    function renderLineups(fixture) {
      var el = document.getElementById('lineups-container');
      var participants = fixture.participants || [];
      var home = participants.find(function(p) { return p.meta && p.meta.location === 'home'; }) || participants[0] || {};
      var away = participants.find(function(p) { return p.meta && p.meta.location === 'away'; }) || participants[1] || {};

      var lineups = fixture.lineups || [];
      console.log(fixture.lineups);
      if (!lineups.length) {
        el.innerHTML = '<div class="empty-state">Lineups not available.</div>';
        return;
      }

      function buildCol(teamId, teamName) {
        var players   = lineups.filter(function(p) { return (p.team_id === teamId) || (p.participant_id === teamId); });
        var starters  = players.filter(function(p) { return p.type_id === 11; })
          .sort(function(a, b) { return (a.jersey_number || 99) - (b.jersey_number || 99); });
        var subs      = players.filter(function(p) { return p.type_id === 12; })
          .sort(function(a, b) { return (a.jersey_number || 99) - (b.jersey_number || 99); });

        var html = '<div class="lineup-team-name">' + teamName + '</div>';

        if (starters.length) {
          html += '<div class="lineup-group-title">Starting XI</div>';
          starters.forEach(function(p) {
            html += '<div class="lineup-player">'
              + '<span class="lineup-jersey">' + (p.jersey_number || '') + '</span>'
              + '<span class="lineup-name">' + (p.player_name || '') + '</span>'
              + '</div>';
          });
        }

        if (subs.length) {
          html += '<div class="lineup-group-title">Substitutes</div>';
          subs.forEach(function(p) {
            html += '<div class="lineup-player">'
              + '<span class="lineup-jersey">' + (p.jersey_number || '') + '</span>'
              + '<span class="lineup-name">' + (p.player_name || '') + '</span>'
              + '</div>';
          });
        }

        if (!starters.length && !subs.length) {
          html += '<div class="empty-state" style="padding:1rem 0">Not available.</div>';
        }

        return html;
      }

      el.innerHTML = '<div class="lineups-grid">'
        + '<div class="lineup-col">' + buildCol(home.id, home.name || 'Home') + '</div>'
        + '<div class="lineup-col">' + buildCol(away.id, away.name || 'Away') + '</div>'
        + '</div>';
    }

    loadMatch();
  </script>
</body>
</html>
