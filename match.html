<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">
  <title>Match — Far Post</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/farpost.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { background: #111213; color: #e8e6e1; font-family: 'Barlow', sans-serif; min-height: 100vh; }

    .nav { position: sticky; top: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 0 1.25rem; height: 52px; border-bottom: 1px solid #2a2b2d; background: rgba(13,14,15,0.96); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); transition: height 0.2s ease, box-shadow 0.2s ease; }
    .nav.scrolled { height: 44px; box-shadow: 0 2px 24px rgba(0,0,0,0.5); border-bottom-color: #1a1b1d; }
    .logo { font-family: 'Barlow Condensed', sans-serif; font-size: 26px; font-weight: 700; letter-spacing: 0.12em; color: #e8e6e1; text-decoration: none; white-space: nowrap; transition: font-size 0.2s; }
    .nav.scrolled .logo { font-size: 22px; }
    .logo-dot { color: #e84040; }
    .nav-links { display: flex; gap: 20px; }
    .nav-links a { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 600; letter-spacing: 0.08em; text-decoration: none; color: #888; text-transform: uppercase; }
    .nav-links a:hover { color: #e8e6e1; }
    .nav-links a.active { color: #e8e6e1; border-bottom: 2px solid #e84040; padding-bottom: 2px; }
    .nav-hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; padding: 4px; background: none; border: none; flex-shrink: 0; }
    .nav-hamburger span { display: block; width: 22px; height: 2px; background: #888; }
    .mobile-menu { display: none; flex-direction: column; background: rgba(13,14,15,0.98); border-bottom: 1px solid #2a2b2d; position: sticky; top: 52px; z-index: 99; }
    .mobile-menu.open { display: flex; }
    .mobile-menu a { font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: #888; text-decoration: none; padding: 0.875rem 1.25rem; border-bottom: 1px solid #1a1b1d; }
    .mobile-menu a:last-child { border-bottom: none; }

    .match-utility { display: flex; align-items: center; justify-content: space-between; gap: 1rem; padding: 0.85rem 1.25rem; border-bottom: 1px solid #1a1b1d; background: #0d0e0f; }
    .match-back-link { display: inline-flex; align-items: center; gap: 0.55rem; font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: #aaa; text-decoration: none; }
    .match-back-link:hover { color: #e8e6e1; }
    .match-back-arrow { color: #e84040; font-size: 13px; line-height: 1; }
    .match-centre-label { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; color: #555; white-space: nowrap; }

    /* ── MATCH HERO ── */
    .match-hero { background: #0d0e0f; padding: 4.5rem 1.5rem 3.75rem; border-bottom: 1px solid #2a2b2d; }
    .match-teams-header { display: flex; align-items: center; justify-content: center; gap: 1.5rem; max-width: 980px; margin: 0 auto; }
    .team-side { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 1rem; }
    .team-side-link { display: flex; flex-direction: column; align-items: center; gap: 1rem; color: inherit; text-decoration: none; border-radius: 4px; transition: color 0.15s ease; }
    .team-side-link:hover { color: #fff; }
    .team-side-link:focus-visible { outline: 2px solid #e84040; outline-offset: 4px; }
    .team-crest-hero { width: 112px; height: 112px; object-fit: contain; }
    .team-name-hero { font-family: 'Barlow Condensed', sans-serif; font-size: 22px; font-weight: 700; color: #e8e6e1; text-align: center; line-height: 1.1; }
    .score-center { display: flex; flex-direction: column; align-items: center; gap: 0.625rem; flex-shrink: 0; min-width: 280px; }
    .score-line { display: flex; align-items: center; gap: 0.875rem; }
    .score-num { font-family: 'Barlow Condensed', sans-serif; font-size: 96px; font-weight: 800; color: #e8e6e1; line-height: 0.9; min-width: 82px; text-align: center; }
    .score-sep { font-family: 'Barlow Condensed', sans-serif; font-size: 56px; font-weight: 300; color: #333; }
    .match-status-badge { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: #555; }
    .match-status-badge.live { color: #e84040; }

    .match-jump-wrap { padding: 0.85rem 1.25rem 0; background: linear-gradient(180deg, #0d0e0f 0%, #111213 100%); }
    .match-jump-nav { display: inline-flex; gap: 0; border: 1px solid #2a2b2d; background: #0d0e0f; overflow-x: auto; max-width: 100%; }
    .match-jump-link { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: #555; text-decoration: none; padding: 0.7rem 1rem; border-right: 1px solid #2a2b2d; white-space: nowrap; transition: color 0.15s, background 0.15s, box-shadow 0.15s; }
    .match-jump-link:last-child { border-right: none; }
    .match-jump-link:hover { color: #e8e6e1; background: #161718; }
    .match-jump-link.active { color: #e84040; background: #161718; box-shadow: inset 0 -2px 0 #e84040; }

    .match-main { padding: 1rem 0 2.5rem; }
    .match-section { margin-top: 1rem; border-top: 1px solid #2a2b2d; border-bottom: 1px solid #2a2b2d; background: #111213; }
    .match-section:first-child { margin-top: 0; }
    .match-section, .match-hero { scroll-margin-top: 108px; }

    /* ── SECTION HEADERS ── */
    .section-header { display: flex; align-items: center; justify-content: space-between; gap: 1rem; padding: 0.8rem 1.25rem; border-bottom: 1px solid #2a2b2d; background: #0d0e0f; }
    .section-title { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: #555; }
    .section-title span { color: #e84040; margin-right: 8px; }
    .section-note { font-family: 'Barlow Condensed', sans-serif; font-size: 10px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: #444; }

    /* ── SUMMARY ── */
    .summary-container { padding: 1.25rem; }
    .summary-lede { max-width: 760px; font-size: 15px; line-height: 1.6; color: #b6b2ab; }
    .summary-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 0.85rem; margin-top: 1rem; }
    .summary-card { padding: 0.95rem 1rem; border: 1px solid #2a2b2d; background: #0d0e0f; min-width: 0; }
    .summary-label { display: block; font-family: 'Barlow Condensed', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: #555; margin-bottom: 0.35rem; }
    .summary-value { display: block; font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 700; color: #e8e6e1; line-height: 1.15; }
    .summary-value.muted { font-size: 15px; color: #aaa; }

    /* ── TIMELINE ── */
    .timeline-teams-header { display: grid; grid-template-columns: 1fr 48px 1fr; padding: 0.5rem 1.25rem; border-bottom: 1px solid #1a1b1d; }
    .tl-team-label { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: #444; }
    .tl-team-label.home { text-align: right; padding-right: 10px; }
    .tl-team-label.away { padding-left: 10px; }
    .timeline-wrap { position: relative; padding: 0.8rem 0; }
    .timeline-wrap::before { content: ''; position: absolute; top: 0; bottom: 0; left: 50%; width: 1px; background: #2a2b2d; transform: translateX(-50%); pointer-events: none; }
    .tl-row { display: grid; grid-template-columns: 1fr 48px 1fr; align-items: center; padding: 0.55rem 1.25rem; position: relative; }
    .tl-home { display: flex; align-items: center; justify-content: flex-end; gap: 8px; padding-right: 10px; min-width: 0; }
    .tl-away { display: flex; align-items: center; gap: 8px; padding-left: 10px; min-width: 0; }
    .tl-mid { display: flex; align-items: center; justify-content: center; }
    .tl-dot { width: 34px; height: 34px; border-radius: 50%; background: #161718; border: 1px solid #2a2b2d; display: flex; align-items: center; justify-content: center; position: relative; z-index: 1; }
    .tl-dot svg { width: 20px; height: 20px; display: block; }
    .tl-dot.goal { background: #1c1d1f; border-color: #4a4c50; box-shadow: 0 0 0 4px rgba(255,255,255,0.03); }
    .tl-dot.own-goal { background: rgba(204,0,0,0.12); border-color: rgba(204,0,0,0.32); box-shadow: 0 0 0 4px rgba(204,0,0,0.08); }
    .tl-content { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
    .tl-player { font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 600; color: #e8e6e1; line-height: 1.15; overflow-wrap: anywhere; }
    .tl-sub-extra { font-family: 'Barlow Condensed', sans-serif; font-size: 12px; color: #777; line-height: 1.1; }
    .tl-min { display: inline-flex; align-items: center; justify-content: center; min-width: 38px; padding: 0.18rem 0.45rem; border: 1px solid #2a2b2d; border-radius: 999px; background: #161718; font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; color: #888; white-space: nowrap; flex-shrink: 0; }
    .tl-home .tl-content { align-items: flex-end; }

    /* ── LINEUPS ── */
    .lineups-grid { display: grid; grid-template-columns: 1fr; }
    .lineup-col { padding: 1rem 1.25rem; }
    .lineup-switcher { display: flex; gap: 0; border-bottom: 1px solid #2a2b2d; background: #0d0e0f; overflow: hidden; width: 100%; }
    .lineup-switch-btn { flex: 1 1 50%; min-width: 0; font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: #555; background: none; border: none; border-right: 1px solid #2a2b2d; padding: 0.85rem 1rem; cursor: pointer; white-space: nowrap; text-align: center; transition: color 0.15s, background 0.15s; }
    .lineup-switch-btn:last-child { border-right: none; }
    .lineup-switch-btn:hover { color: #e8e6e1; background: #161718; }
    .lineup-switch-btn.active { color: #e84040; background: #161718; box-shadow: inset 0 -2px 0 #e84040; }
    .lineup-team-name { font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 700; color: #e8e6e1; padding-bottom: 0.625rem; border-bottom: 1px solid #2a2b2d; margin-bottom: 0.625rem; }
    .section-team-link { display: inline-flex; align-items: center; color: inherit; text-decoration: none; border-radius: 3px; transition: color 0.15s ease; }
    .section-team-link:hover { color: #fff; }
    .section-team-link:focus-visible { outline: 2px solid #e84040; outline-offset: 2px; }
    .lineup-group-title { font-family: 'Barlow Condensed', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; color: #444; margin: 0.75rem 0 0.4rem; }
    .lineup-player { display: flex; align-items: center; gap: 8px; padding: 0.3rem 0; border-bottom: 1px solid #1a1b1d; }
    .lineup-player:last-child { border-bottom: none; }
    .lineup-jersey { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700; color: #555; min-width: 22px; text-align: center; }
    .lineup-name { font-family: 'Barlow Condensed', sans-serif; font-size: 15px; color: #e8e6e1; }
    .lineup-sub-group { margin-top: 0.9rem; padding: 0.7rem 0.8rem 0.2rem; background: #202123; border-top: 1px solid #2d2e31; border-radius: 4px; }
    .lineup-sub-group .lineup-group-title { margin-top: 0; color: #7f8186; }
    .lineup-sub-group .lineup-player { border-bottom-color: #2a2b2d; }

    /* ── SHARED STATES ── */
    .empty-state { padding: 2.5rem 1.25rem; text-align: center; color: #555; font-size: 14px; }
    .loading-state { padding: 2rem 1.25rem; text-align: center; }
    .loading-dots { display: inline-flex; gap: 6px; }
    .loading-dots span { width: 6px; height: 6px; border-radius: 50%; background: #e84040; animation: pulse 1.2s ease-in-out infinite; }
    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse { 0%,80%,100% { opacity: 0.2; } 40% { opacity: 1; } }

    .footer { padding: 1.25rem; border-top: 1px solid #2a2b2d; background: #0d0e0f; display: flex; align-items: center; justify-content: space-between; }
    .footer-logo { font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 700; letter-spacing: 0.12em; color: #333; }
    .footer-logo span { color: #e84040; }
    .footer-copy { font-size: 12px; color: #444; }

    /* ── FORM GUIDE ── */
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; border-bottom: 1px solid #2a2b2d; }
    .form-col { padding: 1rem 1.25rem; }
    .form-col:first-child { border-right: 1px solid #2a2b2d; }
    .form-team-label { font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 700; color: #e8e6e1; padding-bottom: 0.625rem; border-bottom: 1px solid #2a2b2d; margin-bottom: 0.75rem; }
    .form-strip { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 0.65rem; }
    .form-item { display: flex; flex-direction: column; align-items: center; gap: 5px; min-width: 0; padding: 0.7rem 0.35rem; border: 1px solid #2a2b2d; border-radius: 3px; background: #0d0e0f; }
    .form-crest { width: 28px; height: 28px; object-fit: contain; }
    .form-crest-blank { width: 28px; height: 28px; }
    .form-score { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700; color: #e8e6e1; }
    .form-badge { font-family: 'Barlow Condensed', sans-serif; font-size: 10px; font-weight: 800; letter-spacing: 0.06em; padding: 1px 5px; border-radius: 2px; }
    .form-badge.W { background: #1a3320; color: #4caf50; }
    .form-badge.D { background: #2a2b2d; color: #888; }
    .form-badge.L { background: #3d1a1a; color: #e84040; }
    .form-date { font-family: 'Barlow Condensed', sans-serif; font-size: 10px; color: #555; white-space: nowrap; }

    @media (max-width: 768px) {
      .match-utility { padding-left: 1rem; padding-right: 1rem; }
      .match-hero { padding: 3rem 1rem 2.5rem; }
      .match-jump-wrap { padding: 0.7rem 1rem 0; }
      .match-main { padding-top: 0.65rem; }
      .match-section { margin-top: 0.75rem; }
      .section-header { padding: 0.7rem 1rem; }
      .match-teams-header { gap: 1rem; max-width: 100%; }
      .team-side { min-width: 0; }
      .team-crest-hero { width: 84px; height: 84px; }
      .team-name-hero { font-size: 18px; }
      .score-center { min-width: 0; }
      .score-line { gap: 0.5rem; }
      .score-num { font-size: 74px; min-width: 56px; }
      .score-sep { font-size: 42px; }
      .summary-container { padding: 0.85rem 1rem 0.95rem; }
      .summary-lede { font-size: 14px; line-height: 1.5; }
      .summary-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 0.5rem; margin-top: 0.75rem; }
      .summary-card { padding: 0.78rem 0.72rem; min-height: 72px; }
      .summary-label { margin-bottom: 0.28rem; font-size: 9.5px; letter-spacing: 0.13em; }
      .summary-value { font-size: 15px; line-height: 1.12; }
      .summary-value.muted { font-size: 12.5px; }
      .form-grid { grid-template-columns: 1fr; }
      .form-col:first-child { border-right: none; border-bottom: 1px solid #2a2b2d; }
      .lineup-switcher { width: 100%; }
      .lineup-switch-btn { flex-basis: 50%; padding: 0.9rem 0.75rem; font-size: 12px; }
    }

    @media (max-width: 680px) {
      .nav-links { display: none; }
      .nav-hamburger { display: flex; }
      .match-utility { flex-wrap: wrap; padding: 0.75rem 1rem; }
      .match-centre-label { width: 100%; }
      .match-hero { padding: 2.5rem 1rem 2.25rem; }
      .match-jump-wrap { padding-top: 0.6rem; }
      .match-jump-nav { display: flex; width: 100%; }
      .match-jump-link { flex: 1 1 25%; text-align: center; padding: 0.62rem 0.65rem; }
      .match-teams-header { gap: 0.75rem; align-items: flex-start; }
      .score-center { min-width: 0; }
      .score-num { font-size: 68px; min-width: 52px; }
      .score-sep { font-size: 40px; }
      .team-crest-hero { width: 72px; height: 72px; }
      .team-name-hero { font-size: 16px; }
      .lineup-col { padding: 0.75rem 0.75rem; }
      .lineup-name { font-size: 13px; }
      .footer { flex-direction: column; gap: 6px; text-align: center; }
    }

    @media (max-width: 480px) {
      .match-hero { padding: 1.85rem 0.75rem 1.75rem; }
      .match-jump-wrap { padding: 0.55rem 0.75rem 0; }
      .match-main { padding-top: 0.55rem; }
      .match-section { margin-top: 0.65rem; }
      .section-header { padding: 0.62rem 0.75rem; }
      .match-teams-header { gap: 0.35rem; }
      .team-side { gap: 0.65rem; }
      .team-crest-hero { width: 56px; height: 56px; }
      .team-name-hero { font-size: 13px; }
      .score-line { gap: 0.25rem; }
      .score-num { font-size: 52px; min-width: 40px; }
      .score-sep { font-size: 30px; }
      .match-status-badge { font-size: 10px; letter-spacing: 0.1em; }
      .match-jump-link { padding: 0.58rem 0.45rem; font-size: 10px; letter-spacing: 0.08em; }
      .summary-container { padding: 0.75rem 0.75rem 0.85rem; }
      .summary-lede { font-size: 13px; line-height: 1.42; }
      .summary-grid { gap: 0.45rem; margin-top: 0.65rem; }
      .summary-card { padding: 0.68rem 0.62rem; min-height: 70px; }
      .summary-label { margin-bottom: 0.22rem; font-size: 9.5px; letter-spacing: 0.12em; }
      .summary-value { font-size: 14px; line-height: 1.1; }
      .summary-value.muted { font-size: 11.5px; }
      .timeline-teams-header, .tl-row { grid-template-columns: minmax(0, 1fr) 44px minmax(0, 1fr); padding-left: 0.75rem; padding-right: 0.75rem; }
      .timeline-teams-header { padding-top: 0.6rem; padding-bottom: 0.6rem; }
      .tl-home, .tl-away { gap: 7px; }
      .tl-dot { width: 30px; height: 30px; }
      .tl-dot svg { width: 18px; height: 18px; }
      .tl-player { font-size: 13px; }
      .tl-sub-extra { font-size: 11px; }
      .tl-min { min-width: 34px; padding: 0.14rem 0.35rem; font-size: 10px; }
      .lineups-grid { grid-template-columns: 1fr; }
      .lineup-switch-btn { padding: 0.85rem 0.5rem; font-size: 11px; letter-spacing: 0.08em; }
      .form-col { padding: 0.85rem 0.75rem; }
      .form-strip { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .form-item { min-width: 0; padding: 0.65rem 0.25rem; }
    }
  </style>
</head>

      <a class="match-jump-link" href="#section-form" data-jump-link="section-form">Form</a>
    </nav>
  </div>

  <main class="match-main">
    <section class="match-section" id="section-summary" data-jump-section>
      <div class="section-header">
        <div class="section-title"><span>//</span>Summary</div>
        <div class="section-note">Match centre</div>
      </div>
      <div class="summary-container" id="summary-container">
        <div class="loading-state"><div class="loading-dots"><span></span><span></span><span></span></div></div>
      </div>
    </section>

    <section class="match-section" id="section-timeline" data-jump-section>
      <div class="section-header">
        <div class="section-title"><span>//</span>Match timeline</div>
      </div>
      <div id="timeline-container">
        <div class="loading-state"><div class="loading-dots"><span></span><span></span><span></span></div></div>
      </div>
    </section>

    <section class="match-section" id="section-lineups" data-jump-section>
      <div class="section-header">
        <div class="section-title"><span>//</span>Lineups</div>
      </div>
      <div id="lineups-container">
        <div class="loading-state"><div class="loading-dots"><span></span><span></span><span></span></div></div>
      </div>
    </section>

    <section class="match-section" id="section-form" data-jump-section>
      <div class="section-header">
        <div class="section-title"><span>//</span>Form guide</div>
      </div>
      <div id="form-container">
        <div class="loading-state"><div class="loading-dots"><span></span><span></span><span></span></div></div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="footer-logo">FAR POST<span>.</span></div>
    <div class="footer-copy">Scottish football. No filter.</div>
  </footer>

  <script src="/assets/farpost.js"></script>
  <script>
    var RELEVANT_TYPES = [14, 15, 18, 19, 20];
    var LIVE_STATES = ['LIVE', '1H', '2H', 'HT', 'PEN'];
    var currentMatchLeagueId = '';
    var FarPostUI = window.FarPost;

    function buildClubHref(teamId, leagueId) {
      if (!teamId || !leagueId) return '';
      return 'club.html?id=' + encodeURIComponent(teamId) + '&league=' + encodeURIComponent(leagueId);
    }

    function getFixtureLeagueId(fixture) {
      var params = new URLSearchParams(window.location.search);
      return String(
        fixture.league_id
        || fixture.leagueId
        || (fixture.league && fixture.league.id)
        || (fixture.details && fixture.details.league_id)
        || params.get('league')
        || ''
      );
    }

    function wrapTeamLink(content, teamId, leagueId, teamName) {
      var href = buildClubHref(teamId, leagueId);
      if (!href) return content;
      return '<a class="section-team-link" href="' + href + '" aria-label="View ' + (teamName || 'team') + ' club page">' + content + '</a>';
    }

    function getEventIcon(typeId) {
      if (typeId === 14) {
        return '<svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="8.5" fill="#f4f1eb" stroke="#f4f1eb" stroke-width="1.15"/><polygon points="12,7.1 14.4,8.85 13.5,11.7 10.5,11.7 9.6,8.85" fill="#111213"/><polygon points="8.15,9.3 9.55,12.1 7.35,13.7 5.7,11.3 6.2,9.35" fill="#111213"/><polygon points="15.85,9.3 17.8,9.35 18.3,11.3 16.65,13.7 14.45,12.1" fill="#111213"/><polygon points="8.05,14.45 10.35,12.8 12,14 13.65,12.8 15.95,14.45 15.2,16.45 12,17.55 8.8,16.45" fill="#111213"/><path d="M9.6 8.85 8.15 9.3M14.4 8.85 15.85 9.3M10.5 11.7 8.05 14.45M13.5 11.7 15.95 14.45M12 7.1V5.7M5.7 11.3H4.7M19.3 11.3H18.3M12 17.55V19.2" fill="none" stroke="#111213" stroke-width="0.9" stroke-linecap="round" stroke-linejoin="round"/></svg>';
      }
      if (typeId === 15) {
        return '<svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="8.5" fill="#cc0000" stroke="#cc0000" stroke-width="1.15"/><polygon points="12,7.1 14.4,8.85 13.5,11.7 10.5,11.7 9.6,8.85" fill="#fff4f4"/><polygon points="8.15,9.3 9.55,12.1 7.35,13.7 5.7,11.3 6.2,9.35" fill="#fff4f4"/><polygon points="15.85,9.3 17.8,9.35 18.3,11.3 16.65,13.7 14.45,12.1" fill="#fff4f4"/><polygon points="8.05,14.45 10.35,12.8 12,14 13.65,12.8 15.95,14.45 15.2,16.45 12,17.55 8.8,16.45" fill="#fff4f4"/><path d="M9.6 8.85 8.15 9.3M14.4 8.85 15.85 9.3M10.5 11.7 8.05 14.45M13.5 11.7 15.95 14.45M12 7.1V5.7M5.7 11.3H4.7M19.3 11.3H18.3M12 17.55V19.2" fill="none" stroke="#fff4f4" stroke-width="0.9" stroke-linecap="round" stroke-linejoin="round"/></svg>';
      }
      if (typeId === 19) {
        return '<svg viewBox="0 0 20 20" aria-hidden="true"><rect x="5" y="3.5" width="10" height="13" rx="1.7" fill="#f5c842"/></svg>';
      }
      if (typeId === 20) {
        return '<svg viewBox="0 0 20 20" aria-hidden="true"><rect x="5" y="3.5" width="10" height="13" rx="1.7" fill="#CC0000"/></svg>';
      }
      if (typeId === 18) {
        return '<svg viewBox="0 0 20 20" aria-hidden="true"><path d="M6 4.5h5.5l-1.9-1.9 1.2-1.1 4 4-4 4-1.2-1.1 1.9-1.9H6z" fill="#e8e6e1"/><path d="M14 15.5H8.5l1.9 1.9-1.2 1.1-4-4 4-4 1.2 1.1-1.9 1.9H14z" fill="#CC0000"/></svg>';
      }
      return '<svg viewBox="0 0 20 20" aria-hidden="true"><circle cx="10" cy="10" r="3" fill="#666"/></svg>';
    }

    async function loadMatch() {
      var params = new URLSearchParams(window.location.search);
      var id = params.get('id');

      if (!id) {
        FarPostUI.renderState('#match-hero', 'empty', {
          eyebrow: 'Match centre',
          title: 'No match selected',
          message: 'Choose a fixture or result to open the live match centre.',
          compact: true
        });
        FarPostUI.setHTML('#summary-container', '');
        FarPostUI.setHTML('#timeline-container', '');
        FarPostUI.setHTML('#lineups-container', '');
        FarPostUI.setHTML('#form-container', '');
        return;
      }

      try {
        var res  = await fetch('/.netlify/functions/match-detail?fixtureId=' + id);
        var body = await res.json();
        if (!res.ok) throw new Error(body.error || 'Failed');

        var fixture = body.data;
        currentMatchLeagueId = getFixtureLeagueId(fixture);
        renderHero(fixture);
        renderSummary(fixture);
        renderTimeline(fixture);
        renderLineups(fixture);

        var participants = fixture.participants || [];
        var home = participants.find(function(p) { return p.meta && p.meta.location === 'home'; }) || participants[0] || {};
        var away = participants.find(function(p) { return p.meta && p.meta.location === 'away'; }) || participants[1] || {};
        if (home.id && away.id) loadForm(home, away);
        else FarPostUI.setHTML('#form-container', '');
      } catch (e) {
        FarPostUI.renderState('#match-hero', 'error', {
          eyebrow: 'Match centre',
          title: 'Could not load match data',
          message: 'Please try again later.',
          compact: true
        });
        FarPostUI.setHTML('#summary-container', '');
        FarPostUI.setHTML('#timeline-container', '');
        FarPostUI.setHTML('#lineups-container', '');
        FarPostUI.setHTML('#form-container', '');
      }
    }

    function renderHero(fixture) {
      var participants = fixture.participants || [];
      var home = participants.find(function(p) { return p.meta && p.meta.location === 'home'; }) || participants[0] || {};
      var away = participants.find(function(p) { return p.meta && p.meta.location === 'away'; }) || participants[1] || {};

      var scores    = fixture.scores || [];
      var ftScores  = scores.filter(function(s) { return s.description === 'CURRENT' || s.description === 'FT'; });
      var homeScore = ftScores.find(function(s) { return s.score && s.score.participant === 'home'; });
      var awayScore = ftScores.find(function(s) { return s.score && s.score.participant === 'away'; });
      var homeGoals = homeScore && homeScore.score && homeScore.score.goals != null ? homeScore.score.goals : '-';
      var awayGoals = awayScore && awayScore.score && awayScore.score.goals != null ? awayScore.score.goals : '-';

      var state     = fixture.state || {};
      var stateShort = state.short || '';
      var stateName  = state.name || stateShort || '';
      var isLive     = LIVE_STATES.indexOf(stateShort) !== -1;
      var leagueId   = currentMatchLeagueId;

      var homeCrest = home.image_path
        ? '<img class="team-crest-hero" src="' + home.image_path + '" alt="" data-fallback="hide">'
        : '';
      var awayCrest = away.image_path
        ? '<img class="team-crest-hero" src="' + away.image_path + '" alt="" data-fallback="hide">'
        : '';

      FarPostUI.setHTML('#match-hero',
        '<div class="match-teams-header">'
        + '<div class="team-side">'
        + (buildClubHref(home.id, leagueId)
          ? '<a class="team-side-link" href="' + buildClubHref(home.id, leagueId) + '" aria-label="View ' + (home.name || 'Home') + ' club page">' + homeCrest + '<div class="team-name-hero">' + (home.name || 'Home') + '</div></a>'
          : homeCrest + '<div class="team-name-hero">' + (home.name || 'Home') + '</div>')
        + '</div>'
        + '<div class="score-center">'
        + '<div class="score-line">'
        + '<span class="score-num">' + homeGoals + '</span>'
        + '<span class="score-sep">-</span>'
        + '<span class="score-num">' + awayGoals + '</span>'
        + '</div>'
        + (stateName ? '<div class="match-status-badge' + (isLive ? ' live' : '') + '">' + stateName + '</div>' : '')
        + '</div>'
        + '<div class="team-side">'
        + (buildClubHref(away.id, leagueId)
          ? '<a class="team-side-link" href="' + buildClubHref(away.id, leagueId) + '" aria-label="View ' + (away.name || 'Away') + ' club page">' + awayCrest + '<div class="team-name-hero">' + (away.name || 'Away') + '</div></a>'
          : awayCrest + '<div class="team-name-hero">' + (away.name || 'Away') + '</div>')
        + '</div>'
        + '</div>');

      document.title = (home.name || 'Home') + ' vs ' + (away.name || 'Away') + ' \u2014 Far Post';
    }

    function formatKickoff(isoString) {
      if (!isoString) return 'TBC';

      var date = new Date(isoString);
      if (isNaN(date.getTime())) return 'TBC';

      return date.toLocaleDateString('en-GB', {
        weekday: 'short',
        day: 'numeric',
        month: 'short'
      }) + ' \u2022 ' + date.toLocaleTimeString('en-GB', {
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    function renderSummary(fixture) {
      var el = document.getElementById('summary-container');
      var participants = fixture.participants || [];
      var home = participants.find(function(p) { return p.meta && p.meta.location === 'home'; }) || participants[0] || {};
      var away = participants.find(function(p) { return p.meta && p.meta.location === 'away'; }) || participants[1] || {};
      var state = fixture.state || {};
      var stateShort = state.short || '';
      var stateName = state.name || stateShort || 'Scheduled';
      var isLive = LIVE_STATES.indexOf(stateShort) !== -1;
      var kickoff = formatKickoff(fixture.starting_at);
      var homeName = home.name || 'Home';
      var awayName = away.name || 'Away';

      FarPostUI.setHTML(el, '<p class="summary-lede">Everything in one place for ' + homeName + ' vs ' + awayName + ', with the key moments, confirmed lineups and each side&#39;s recent form in a single match-centre view.</p>'
        + '<div class="summary-grid">'
        + '<div class="summary-card"><span class="summary-label">Kick-off</span><span class="summary-value">' + kickoff + '</span></div>'
        + '<div class="summary-card"><span class="summary-label">Status</span><span class="summary-value' + (isLive ? '' : ' muted') + '">' + stateName + '</span></div>'
        + '<div class="summary-card"><span class="summary-label">Coverage</span><span class="summary-value muted">Timeline, lineups and form guide</span></div>'
        + '</div>');
    }

    function renderTimeline(fixture) {
      var el    = document.getElementById('timeline-container');
      var participants = fixture.participants || [];
      var home  = participants.find(function(p) { return p.meta && p.meta.location === 'home'; }) || participants[0] || {};
      var away  = participants.find(function(p) { return p.meta && p.meta.location === 'away'; }) || participants[1] || {};
      var homeId = home.id;

      var events = (fixture.events || [])
        .filter(function(e) { return RELEVANT_TYPES.indexOf(e.type_id) !== -1 && e.player_name; })
        .sort(function(a, b) {
          var ma = (a.minute || 0) * 100 + (a.minute_extra || 0);
          var mb = (b.minute || 0) * 100 + (b.minute_extra || 0);
          return ma - mb;
        });

      if (!events.length) {
        FarPostUI.renderState(el, 'empty', {
          eyebrow: 'Timeline',
          title: 'No timeline events available',
          message: 'This fixture does not have confirmed incident data yet.',
          compact: true
        });
        return;
      }

      var html = '<div class="timeline-teams-header">'
        + '<div class="tl-team-label home">' + (home.short_code || home.name || 'Home') + '</div>'
        + '<div></div>'
        + '<div class="tl-team-label away">' + (away.short_code || away.name || 'Away') + '</div>'
        + '</div>'
        + '<div class="timeline-wrap">';

      events.forEach(function(e) {
        var isHome  = e.participant_id === homeId;
        var icon    = getEventIcon(e.type_id);
        var dotClass = 'tl-dot';
        if (e.type_id === 14) dotClass += ' goal';
        if (e.type_id === 15) dotClass += ' own-goal';
        var minStr  = (e.minute || 0) + (e.minute_extra ? '+' + e.minute_extra : '') + '\'';
        var player  = e.player_name || '';
        var related = e.related_player_name || '';

        var contentHtml = '<div class="tl-content">'
          + (player ? '<span class="tl-player">' + player + '</span>' : '')
          + (e.type_id === 18 && related ? '<span class="tl-sub-extra">\u2191 ' + related + '</span>' : '')
          + '</div>'
          + '<span class="tl-min">' + minStr + '</span>';

        var homeContent = isHome ? contentHtml : '';
        var awayContent = !isHome ? contentHtml : '';

        html += '<div class="tl-row">'
          + '<div class="tl-home">' + homeContent + '</div>'
          + '<div class="tl-mid"><div class="' + dotClass + '">' + icon + '</div></div>'
          + '<div class="tl-away">' + awayContent + '</div>'
          + '</div>';
      });

      html += '</div>';
      FarPostUI.setHTML(el, html);
    }

    function renderLineups(fixture) {
      var el = document.getElementById('lineups-container');
      var participants = fixture.participants || [];
      var home = participants.find(function(p) { return p.meta && p.meta.location === 'home'; }) || participants[0] || {};
      var away = participants.find(function(p) { return p.meta && p.meta.location === 'away'; }) || participants[1] || {};

      var lineups = fixture.lineups || [];
      if (!lineups.length) {
        FarPostUI.renderState(el, 'empty', {
          eyebrow: 'Lineups',
          title: 'Lineups not available',
          message: 'Confirmed teams will appear here once the feed provides them.',
          compact: true
        });
        return;
      }

      function buildCol(teamId, teamName) {
        var players   = lineups.filter(function(p) { return (p.team_id === teamId) || (p.participant_id === teamId); });
        var starters  = players.filter(function(p) { return p.type_id === 11; })
          .sort(function(a, b) { return (a.jersey_number || 99) - (b.jersey_number || 99); });
        var subs      = players.filter(function(p) { return p.type_id === 12; })
          .sort(function(a, b) { return (a.jersey_number || 99) - (b.jersey_number || 99); });

        var html = '<div class="lineup-team-name">' + wrapTeamLink(teamName, teamId, currentMatchLeagueId, teamName) + '</div>';

        if (starters.length) {
          html += '<div class="lineup-group-title">Starting XI</div>';
          starters.forEach(function(p) {
            html += '<div class="lineup-player">'
              + '<span class="lineup-jersey">' + (p.jersey_number || '') + '</span>'
              + '<span class="lineup-name">' + (p.player_name || '') + '</span>'
              + '</div>';
          });
        }

        if (subs.length) {
          html += '<div class="lineup-sub-group"><div class="lineup-group-title">Substitutes</div>';
          subs.forEach(function(p) {
            html += '<div class="lineup-player">'
              + '<span class="lineup-jersey">' + (p.jersey_number || '') + '</span>'
              + '<span class="lineup-name">' + (p.player_name || '') + '</span>'
              + '</div>';
          });
          html += '</div>';
        }

        if (!starters.length && !subs.length) {
          html += FarPostUI.stateMarkup('empty', {
            title: 'Not available',
            compact: true
          });
        }

        return html;
      }

      var teamViews = {
        home: buildCol(home.id, home.name || 'Home'),
        away: buildCol(away.id, away.name || 'Away')
      };

      FarPostUI.setHTML(el, '<div class="lineup-switcher">'
        + '<button class="lineup-switch-btn active" type="button" data-lineup-team="home">' + (home.short_code || home.name || 'Home') + '</button>'
        + '<button class="lineup-switch-btn" type="button" data-lineup-team="away">' + (away.short_code || away.name || 'Away') + '</button>'
        + '</div>'
        + '<div class="lineups-grid">'
        + '<div class="lineup-col" id="lineup-team-panel">' + teamViews.home + '</div>'
        + '</div>');

      el.querySelectorAll('.lineup-switch-btn').forEach(function(button) {
        button.addEventListener('click', function() {
          var teamKey = button.getAttribute('data-lineup-team');
          el.querySelectorAll('.lineup-switch-btn').forEach(function(btn) {
            btn.classList.toggle('active', btn === button);
          });
          FarPostUI.setHTML('#lineup-team-panel', teamViews[teamKey] || '');
        });
      });
    }

    async function loadForm(home, away) {
      var el = document.getElementById('form-container');
      try {
        var homeUrl = '/.netlify/functions/team-form?teamId=' + encodeURIComponent(home.id);
        var awayUrl = '/.netlify/functions/team-form?teamId=' + encodeURIComponent(away.id);
        var responses = await Promise.all([
          fetch(homeUrl),
          fetch(awayUrl)
        ]);
        var homeData = await responses[0].json();
        var awayData = await responses[1].json();
        if ((homeData && homeData.error) || (awayData && awayData.error)) {
          throw new Error((homeData && homeData.error) || (awayData && awayData.error) || 'Failed');
        }
        renderForm(Array.isArray(homeData) ? homeData : [], home, Array.isArray(awayData) ? awayData : [], away);
      } catch (e) {
        console.error('[form-guide] failed to load', e);
        FarPostUI.renderState(el, 'error', {
          eyebrow: 'Form guide',
          title: 'Form guide not available',
          message: 'Recent results for one or both clubs could not be loaded.',
          compact: true
        });
      }
    }

    function renderForm(homeResults, home, awayResults, away) {
      var el = document.getElementById('form-container');

      function buildCol(results, team) {
        var html = '<div class="form-team-label">' + wrapTeamLink(team.name || '', team.id, currentMatchLeagueId, team.name || 'team') + '</div><div class="form-strip">';
        if (!results.length) {
          html += '<span style="font-size:13px;color:#555">No recent results</span>';
        } else {
          results.forEach(function(r) {
            var isHomeTeam = r.requestedTeamSide === 'home';
            var teamScore = isHomeTeam ? r.homeScore : r.awayScore;
            var oppScore = isHomeTeam ? r.awayScore : r.homeScore;
            var scoreStr  = teamScore + '-' + oppScore;
            var crest     = (isHomeTeam ? r.awayTeamCrest : r.homeTeamCrest);
            var crestHtml = crest
              ? '<img class="form-crest" src="' + crest + '" alt="" data-fallback="hide">'
              : '<div class="form-crest-blank"></div>';
            html += '<div class="form-item">'
              + crestHtml
              + '<span class="form-score">' + scoreStr + '</span>'
              + '<span class="form-badge ' + (r.result || 'D') + '">' + (r.result || 'D') + '</span>'
              + '<span class="form-date">' + (r.date || '') + '</span>'
              + '</div>';
          });
        }
        html += '</div>';
        return html;
      }

      FarPostUI.setHTML(el, '<div class="form-grid">'
        + '<div class="form-col">' + buildCol(homeResults, home) + '</div>'
        + '<div class="form-col">' + buildCol(awayResults, away) + '</div>'
        + '</div>');
    }

    function getBackDestination() {
      var params = new URLSearchParams(window.location.search);
      var from = params.get('from');

      if (from === 'fixtures') {
        return { href: 'fixtures.html', label: 'Back to fixtures' };
      }

      if (from === 'results') {
        return { href: 'results.html', label: 'Back to results' };
      }

      if (document.referrer) {
        try {
          var refUrl = new URL(document.referrer);
          if (refUrl.origin === window.location.origin) {
            if (/fixtures\.html$/i.test(refUrl.pathname)) {
              return { href: 'fixtures.html', label: 'Back to fixtures' };
            }
            if (/results\.html$/i.test(refUrl.pathname)) {
              return { href: 'results.html', label: 'Back to results' };
            }
          }
        } catch (e) {
          /* Ignore malformed referrers and fall back to results. */
        }
      }

      return { href: 'results.html', label: 'Back to results' };
    }

    function initBackLink() {
      var backLink = document.getElementById('match-back-link');
      if (!backLink) return;

      var destination = getBackDestination();
      var textEl = backLink.querySelector('.match-back-text');
      backLink.setAttribute('href', destination.href);
      if (textEl) textEl.textContent = destination.label;
    }

    function initJumpNav() {
      var links = Array.prototype.slice.call(document.querySelectorAll('[data-jump-link]'));
      var sections = Array.prototype.slice.call(document.querySelectorAll('[data-jump-section]'));
      if (!links.length || !sections.length || typeof IntersectionObserver === 'undefined') return;

      var observer = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) {
          if (!entry.isIntersecting) return;
          var activeId = entry.target.id;
          links.forEach(function(link) {
            link.classList.toggle('active', link.getAttribute('data-jump-link') === activeId);
          });
        });
      }, {
        rootMargin: '-35% 0px -50% 0px',
        threshold: 0.15
      });

      sections.forEach(function(section) {
        observer.observe(section);
      });
    }

    initBackLink();
    initJumpNav();
    loadMatch();
  </script>
</body>
</html>
